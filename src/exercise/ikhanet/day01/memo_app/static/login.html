<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — 메모장</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-container">
        <h1>메모장</h1>
        <form id="login-form">
            <input type="text" id="username" placeholder="아이디" required autocomplete="username">
            <input type="password" id="password" placeholder="비밀번호" required autocomplete="current-password">
            <p id="login-error" class="error-msg"></p>
            <button type="submit">로그인</button>
        </form>
    </div>
    <script>
        if (localStorage.getItem('token')) location.href = '/';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
            };
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                location.href = '/';
            } else {
                const err = await res.json();
                document.getElementById('login-error').textContent = err.detail || '로그인 실패';
            }
        });
    </script>
</body>
</html>
