<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; }

  header {
    padding: 12px 20px;
    background: #181825;
    border-bottom: 1px solid #313244;
    font-weight: 600;
    letter-spacing: 1px;
    font-size: 14px;
    color: #89b4fa;
  }

  .toolbar {
    display: flex; gap: 6px; padding: 8px 16px;
    background: #181825; border-bottom: 1px solid #313244;
  }
  .toolbar button {
    background: #313244; border: none; color: #cdd6f4;
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: background .15s;
  }
  .toolbar button:hover { background: #45475a; }

  .container { display: flex; flex: 1; overflow: hidden; }

  .pane { flex: 1; display: flex; flex-direction: column; }
  .pane-label {
    font-size: 11px; padding: 4px 14px; background: #181825;
    color: #6c7086; border-bottom: 1px solid #313244; letter-spacing: 1px;
  }

  #editor {
    flex: 1; resize: none; border: none; outline: none;
    background: #1e1e2e; color: #cdd6f4; font-family: 'Fira Code', monospace;
    font-size: 14px; line-height: 1.7; padding: 20px;
    border-right: 1px solid #313244;
  }

  #preview {
    flex: 1; padding: 20px; overflow-y: auto; background: #1e1e2e;
    font-size: 14px; line-height: 1.7;
  }

  /* markdown preview styles */
  #preview h1,#preview h2,#preview h3 { color: #89b4fa; margin: 16px 0 8px; }
  #preview h1 { font-size: 1.8em; border-bottom: 1px solid #313244; padding-bottom: 6px; }
  #preview h2 { font-size: 1.4em; }
  #preview a { color: #89dceb; }
  #preview code { background: #313244; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 13px; }
  #preview pre { background: #181825; border: 1px solid #313244; border-radius: 8px; padding: 14px; overflow-x: auto; margin: 10px 0; }
  #preview pre code { background: none; padding: 0; }
  #preview blockquote { border-left: 3px solid #89b4fa; padding-left: 14px; color: #a6adc8; margin: 10px 0; }
  #preview ul,#preview ol { padding-left: 22px; margin: 8px 0; }
  #preview table { border-collapse: collapse; width: 100%; margin: 10px 0; }
  #preview th,#preview td { border: 1px solid #45475a; padding: 6px 12px; }
  #preview th { background: #313244; }
  #preview hr { border: none; border-top: 1px solid #313244; margin: 16px 0; }
  #preview img { max-width: 100%; border-radius: 6px; }

  .divider { width: 4px; background: #313244; cursor: col-resize; }
  .divider:hover { background: #89b4fa; }
</style>
</head>
<body>

<header>✦ Markdown Editor</header>

<div class="toolbar">
  <button onclick="wrap('**','**')"><b>B</b></button>
  <button onclick="wrap('*','*')"><i>I</i></button>
  <button onclick="wrap('`','`')">code</button>
  <button onclick="insert('# ')">H1</button>
  <button onclick="insert('## ')">H2</button>
  <button onclick="insert('- ')">List</button>
  <button onclick="insert('> ')">Quote</button>
  <button onclick="insert('[text](url)')">Link</button>
  <button onclick="clearAll()" style="margin-left:auto;color:#f38ba8">Clear</button>
</div>

<div class="container">
  <div class="pane">
    <div class="pane-label">EDITOR</div>
    <textarea id="editor" spellcheck="false" placeholder="마크다운을 입력하세요..."></textarea>
  </div>
  <div class="divider" id="divider"></div>
  <div class="pane">
    <div class="pane-label">PREVIEW</div>
    <div id="preview"></div>
  </div>
</div>

<script>
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');

  const defaultText = `# 마크다운 에디터

**굵게**, *기울임*, \`코드\` 작성 가능

## 특징
- 실시간 미리보기
- 간단한 툴바
- 다크 테마

> 인용구도 지원됩니다

\`\`\`js
console.log("Hello, Markdown!");
\`\`\`
`;

  editor.value = defaultText;

  function render() {
    preview.innerHTML = marked.parse(editor.value);
  }

  editor.addEventListener('input', render);
  render();

  // Tab key support
  editor.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editor.selectionStart;
      editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(editor.selectionEnd);
      editor.selectionStart = editor.selectionEnd = s + 2;
      render();
    }
  });

  function wrap(before, after) {
    const s = editor.selectionStart, e = editor.selectionEnd;
    const sel = editor.value.slice(s, e) || 'text';
    editor.value = editor.value.slice(0, s) + before + sel + after + editor.value.slice(e);
    editor.focus(); render();
  }

  function insert(text) {
    const s = editor.selectionStart;
    const line = editor.value.lastIndexOf('\n', s - 1) + 1;
    editor.value = editor.value.slice(0, line) + text + editor.value.slice(line);
    editor.focus(); render();
  }

  function clearAll() {
    if (confirm('내용을 모두 지울까요?')) { editor.value = ''; render(); }
  }

  // Resizable divider
  const divider = document.getElementById('divider');
  let dragging = false;
  divider.addEventListener('mousedown', () => dragging = true);
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const container = divider.parentElement;
    const rect = container.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width * 100;
    const clamped = Math.max(20, Math.min(80, ratio));
    container.children[0].style.flex = 'none';
    container.children[0].style.width = clamped + '%';
    container.children[2].style.flex = '1';
  });
  document.addEventListener('mouseup', () => dragging = false);
</script>
</body>
</html>
