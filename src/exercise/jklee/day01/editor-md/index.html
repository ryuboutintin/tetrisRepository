<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #1e1e1e;
      --bg-elev: #252526;
      --bg-deep: #181818;
      --border: #333;
      --text: #d4d4d4;
      --text-muted: #8a8a8a;
      --accent: #4ec9b0;
      --accent-2: #569cd6;
      --code-bg: #2d2d2d;
      --selection: #264f78;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard",
        "Apple SD Gothic Neo", sans-serif;
    }

    ::selection { background: var(--selection); }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .brand .dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }

    .brand .name { color: var(--text); }
    .brand .ext { color: var(--accent-2); }

    .meta {
      font-size: 12px;
      color: var(--text-muted);
      font-family: "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
    }

    .panes {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }

    .pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
    }

    .pane + .pane { border-left: 1px solid var(--border); }

    .pane-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      font-family: "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .pane-header .badge {
      padding: 2px 7px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
    }

    textarea#editor {
      flex: 1 1 auto;
      width: 100%;
      resize: none;
      border: 0;
      outline: 0;
      padding: 18px;
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
      font-size: 14px;
      line-height: 1.6;
      tab-size: 2;
    }

    #preview {
      flex: 1 1 auto;
      overflow: auto;
      padding: 24px 28px;
      background: var(--bg-elev);
      line-height: 1.7;
    }

    #preview h1, #preview h2, #preview h3,
    #preview h4, #preview h5, #preview h6 {
      color: #ffffff;
      margin-top: 1.4em;
      margin-bottom: 0.5em;
      line-height: 1.25;
    }
    #preview h1 { font-size: 1.9em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    #preview h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
    #preview h3 { font-size: 1.25em; }

    #preview p { margin: 0.7em 0; }

    #preview a {
      color: var(--accent-2);
      text-decoration: none;
      border-bottom: 1px dashed var(--accent-2);
    }
    #preview a:hover { color: var(--accent); border-bottom-color: var(--accent); }

    #preview strong { color: #ffffff; }
    #preview em { color: #c8c8c8; }

    #preview ul, #preview ol { padding-left: 1.6em; }
    #preview li { margin: 0.25em 0; }
    #preview li::marker { color: var(--accent); }

    #preview blockquote {
      margin: 1em 0;
      padding: 0.6em 1em;
      border-left: 3px solid var(--accent);
      background: rgba(78, 201, 176, 0.08);
      color: #c8c8c8;
    }

    #preview code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
      font-size: 0.9em;
      color: #ce9178;
    }

    #preview pre {
      background: var(--code-bg);
      padding: 14px 16px;
      border-radius: 6px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    #preview pre code {
      background: transparent;
      padding: 0;
      color: var(--text);
      font-size: 0.9em;
    }

    #preview hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 1.6em 0;
    }

    #preview table {
      border-collapse: collapse;
      margin: 1em 0;
    }
    #preview th, #preview td {
      border: 1px solid var(--border);
      padding: 6px 12px;
    }
    #preview th { background: var(--bg-deep); }

    /* Scrollbar */
    #preview::-webkit-scrollbar,
    textarea#editor::-webkit-scrollbar { width: 10px; height: 10px; }
    #preview::-webkit-scrollbar-thumb,
    textarea#editor::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 5px;
    }
    #preview::-webkit-scrollbar-thumb:hover,
    textarea#editor::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }

    /* Responsive */
    @media (max-width: 768px) {
      .panes { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .pane + .pane { border-left: 0; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <span class="dot"></span>
        <span class="name">markdown</span><span class="ext">.editor</span>
      </div>
      <div class="meta" id="meta">0 chars · 0 words</div>
    </header>

    <main class="panes">
      <section class="pane">
        <div class="pane-header">
          <span>EDITOR</span>
          <span class="badge">md</span>
        </div>
        <textarea id="editor" spellcheck="false" autofocus></textarea>
      </section>
      <section class="pane">
        <div class="pane-header">
          <span>PREVIEW</span>
          <span class="badge">html</span>
        </div>
        <article id="preview"></article>
      </section>
    </main>
  </div>

  <script>
    const sample = `# Markdown Editor

> 왼쪽에 입력하고, 오른쪽에서 결과를 확인하세요.

## 기본 문법

**굵게**, *기울임*, 그리고 [링크](https://marked.js.org)도 됩니다.

### 리스트
- 사과
- 바나나
  - 노란 바나나
  - 초록 바나나
- 체리

### 순서 있는 리스트
1. 첫번째
2. 두번째
3. 세번째

### 인라인 코드
\`const greeting = "Hello, world!";\`

### 코드 블록
\`\`\`js
function fib(n) {
  if (n < 2) return n;
  return fib(n - 1) + fib(n - 2);
}

console.log(fib(10));
\`\`\`

### 인용문
> "Talk is cheap. Show me the code." — Linus Torvalds

---

Happy hacking. 🚀
`;

    const editor = document.getElementById("editor");
    const preview = document.getElementById("preview");
    const meta = document.getElementById("meta");

    marked.setOptions({
      gfm: true,
      breaks: true,
    });

    function render() {
      const src = editor.value;
      preview.innerHTML = marked.parse(src);
      const chars = src.length;
      const words = src.trim() ? src.trim().split(/\s+/).length : 0;
      meta.textContent = `${chars} chars · ${words} words`;
    }

    editor.value = sample;
    render();
    editor.addEventListener("input", render);

    // Tab key inserts two spaces instead of changing focus
    editor.addEventListener("keydown", (e) => {
      if (e.key === "Tab") {
        e.preventDefault();
        const s = editor.selectionStart;
        const eEnd = editor.selectionEnd;
        editor.value = editor.value.slice(0, s) + "  " + editor.value.slice(eEnd);
        editor.selectionStart = editor.selectionEnd = s + 2;
        render();
      }
    });
  </script>
</body>
</html>
