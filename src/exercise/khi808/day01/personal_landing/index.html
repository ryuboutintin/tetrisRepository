<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개인 랜딩 페이지</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
    }

    /* 프로필 사진 섹션 */
    .profile-section {
      margin-bottom: 32px;
    }

    .avatar-wrapper {
      position: relative;
      display: inline-block;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.2);
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto;
    }

    .avatar-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto;
      border: 3px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
    }

    .status-dot {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 18px;
      height: 18px;
      background: #4ade80;
      border-radius: 50%;
      border: 2px solid #1a1a2e;
    }

    /* 소개 섹션 */
    .intro-section {
      margin-bottom: 36px;
    }

    .name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .role {
      font-size: 14px;
      color: #a78bfa;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      margin: 0 auto 16px;
      border-radius: 2px;
    }

    .bio {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.75);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }

    .tag {
      background: rgba(102, 126, 234, 0.2);
      border: 1px solid rgba(102, 126, 234, 0.4);
      color: #a78bfa;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* SMS 링크 섹션 */
    .links-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .link-btn:hover {
      transform: translateY(-2px);
    }

    .link-btn .icon {
      font-size: 18px;
    }

    .btn-sms {
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: #fff;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
    }

    .btn-sms:hover {
      box-shadow: 0 8px 28px rgba(37, 211, 102, 0.5);
    }

    .btn-phone {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    .btn-phone:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
    }

    .btn-email {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-email:hover {
      box-shadow: 0 8px 28px rgba(102, 126, 234, 0.5);
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- 프로필 사진 섹션 -->
    <section class="profile-section">
      <div class="avatar-wrapper">
        <div class="avatar-placeholder">👤</div>
        <div class="status-dot"></div>
      </div>
    </section>

    <!-- 소개 섹션 -->
    <section class="intro-section">
      <h1 class="name">홍길동</h1>
      <p class="role">Full-Stack Developer</p>
      <div class="divider"></div>
      <p class="bio">
        안녕하세요! 저는 사용자 경험을 중시하는 개발자입니다.<br />
        새로운 기술을 배우고 문제를 창의적으로 해결하는 것을 좋아합니다.
      </p>
      <div class="tags">
        <span class="tag">HTML/CSS</span>
        <span class="tag">JavaScript</span>
        <span class="tag">Python</span>
        <span class="tag">React</span>
      </div>
    </section>

    <!-- SMS 링크 섹션 -->
    <section class="links-section">
      <a href="sms:+821012345678" class="link-btn btn-sms">
        <span class="icon">💬</span>
        SMS 문자 보내기
      </a>
      <a href="tel:+821012345678" class="link-btn btn-phone">
        <span class="icon">📞</span>
        전화 걸기
      </a>
      <a href="mailto:example@email.com" class="link-btn btn-email">
        <span class="icon">✉️</span>
        이메일 보내기
      </a>
    </section>

    <p class="footer">© 2026 홍길동. All rights reserved.</p>
  </div>
</body>
</html>
