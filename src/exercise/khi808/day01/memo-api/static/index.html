<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메모장</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── 인증 화면 ── -->
  <div class="auth-wrap" id="authWrap">
    <div class="auth-card">
      <h1 class="auth-logo">✦ 메모장</h1>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin"  onclick="switchAuthTab('login')">로그인</button>
        <button class="auth-tab"        id="tabRegister" onclick="switchAuthTab('register')">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <form class="auth-form" id="loginForm" novalidate>
        <div class="field">
          <label for="loginUser">아이디</label>
          <input id="loginUser" type="text" placeholder="아이디 입력" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="loginPass">비밀번호</label>
          <input id="loginPass" type="password" placeholder="비밀번호 입력" autocomplete="current-password" required />
        </div>
        <p class="auth-error hidden" id="loginError"></p>
        <button type="submit" class="btn-primary">로그인</button>
      </form>

      <!-- 회원가입 폼 -->
      <form class="auth-form hidden" id="registerForm" novalidate>
        <div class="field">
          <label for="regUser">아이디</label>
          <input id="regUser" type="text" placeholder="사용할 아이디 입력" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="regPass">비밀번호</label>
          <input id="regPass" type="password" placeholder="비밀번호 입력" autocomplete="new-password" required />
        </div>
        <p class="auth-error hidden" id="registerError"></p>
        <p class="auth-success hidden" id="registerSuccess"></p>
        <button type="submit" class="btn-primary">가입하기</button>
      </form>
    </div>
  </div>

  <!-- ── 메모 앱 화면 ── -->
  <div class="app hidden" id="app">
    <header class="app-header">
      <span class="logo">✦ 메모장</span>
      <div class="header-right">
        <span class="username-badge" id="usernameBadge"></span>
        <button class="btn-new"    id="btnNew">+ 새 메모</button>
        <button class="btn-logout" id="btnLogout">로그아웃</button>
      </div>
    </header>

    <div class="app-body">
      <!-- 목록 패널 -->
      <aside class="sidebar" id="sidebar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/>
          </svg>
          <input type="search" id="searchInput" placeholder="메모 검색..." autocomplete="off" />
        </div>
        <ul class="memo-list" id="memoList"></ul>
        <div class="empty-list hidden" id="emptyList">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <p>메모가 없습니다</p>
        </div>
      </aside>

      <!-- 편집 패널 -->
      <main class="editor-panel" id="editorPanel">
        <div class="empty-editor" id="emptyEditor">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
            <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
          <p>메모를 선택하거나 새로 만드세요</p>
        </div>

        <form class="memo-form hidden" id="memoForm" novalidate>
          <div class="form-header">
            <button type="button" class="btn-back" id="btnBack">
              <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
                <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
              </svg>
              목록
            </button>
            <span class="form-badge" id="formBadge">새 메모</span>
          </div>

          <div class="field">
            <label for="inputTitle">제목</label>
            <input type="text" id="inputTitle" placeholder="메모 제목을 입력하세요" maxlength="200" required />
          </div>
          <div class="field field-content">
            <label for="inputContent">내용</label>
            <textarea id="inputContent" placeholder="내용을 입력하세요..." required></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-save" id="btnSave">저장</button>
            <button type="button" class="btn-delete hidden" id="btnDelete">삭제</button>
          </div>
        </form>
      </main>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
