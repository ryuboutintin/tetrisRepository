{% extends "base.html" %}
{% block title %}{{ memo.title }} — 메모장{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">

  <!-- 뒤로가기 -->
  <a href="/" class="inline-flex items-center gap-1 text-gray-500 hover:text-blue-600 text-sm mb-6 transition">
    ← 목록으로
  </a>

  <!-- 헤더 -->
  <div class="flex items-center gap-3 mb-6">
    <h1 id="view-title" class="text-2xl font-bold flex-1">{{ memo.title }}</h1>
    <button id="pin-btn" onclick="togglePin()"
      class="px-3 py-1.5 rounded-lg text-sm font-medium border transition
             {% if memo.is_pinned %}bg-yellow-50 border-yellow-300 text-yellow-700 hover:bg-yellow-100
             {% else %}bg-white border-gray-300 text-gray-600 hover:bg-gray-50{% endif %}">
      {% if memo.is_pinned %}📌 고정됨{% else %}📌 고정{% endif %}
    </button>
    <button onclick="confirmDelete()"
      class="px-3 py-1.5 rounded-lg text-sm font-medium border border-red-300 text-red-600 bg-white hover:bg-red-50 transition">
      🗑 삭제
    </button>
  </div>

  <!-- 수정 폼 -->
  <div class="bg-white rounded-xl border border-gray-200 p-6">
    <form id="edit-form">
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">제목</label>
      <input id="edit-title" type="text" value="{{ memo.title }}" required
        class="w-full mb-4 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">내용</label>
      <textarea id="edit-content" rows="10" required
        class="w-full mb-4 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none">{{ memo.content }}</textarea>

      <div class="flex items-center justify-between">
        <p class="text-xs text-gray-400">
          작성: {{ memo.created_at.strftime('%Y-%m-%d %H:%M') }}
          {% if memo.updated_at %}· 수정: {{ memo.updated_at.strftime('%Y-%m-%d %H:%M') }}{% endif %}
        </p>
        <button type="submit"
          class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-medium">
          저장
        </button>
      </div>
    </form>
  </div>

  <!-- 저장 결과 메시지 -->
  <div id="save-msg" class="hidden mt-3 text-center text-sm text-green-600 font-medium">✓ 저장되었습니다</div>
</div>

<script>
const MEMO_ID = {{ memo.id }};

document.getElementById('edit-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const title = document.getElementById('edit-title').value.trim();
  const content = document.getElementById('edit-content').value.trim();
  if (!title || !content) return;

  const res = await fetch(`/api/v1/memos/${MEMO_ID}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, content, is_pinned: false }),
  });

  if (res.ok) {
    const msg = document.getElementById('save-msg');
    msg.classList.remove('hidden');
    setTimeout(() => msg.classList.add('hidden'), 2000);
  } else {
    alert('저장 실패. 다시 시도해주세요.');
  }
});

async function togglePin() {
  const res = await fetch(`/api/v1/memos/${MEMO_ID}/pin`, { method: 'PATCH' });
  if (res.ok) location.reload();
  else alert('핀 변경 실패.');
}

async function confirmDelete() {
  if (!confirm('이 메모를 삭제하시겠습니까?')) return;
  const res = await fetch(`/api/v1/memos/${MEMO_ID}`, { method: 'DELETE' });
  if (res.status === 204) location.href = '/';
  else alert('삭제 실패.');
}
</script>
{% endblock %}
