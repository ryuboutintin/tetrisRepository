{% extends "base.html" %}
{% block title %}회원가입 — 메모장{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-8">
    <h1 class="text-2xl font-bold mb-1 text-center">📝 회원가입</h1>
    <p class="text-gray-400 text-sm text-center mb-6">새 계정을 만들어보세요</p>

    <div id="error-msg" class="hidden mb-4 px-3 py-2 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg"></div>

    <form id="register-form" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">이메일</label>
        <input id="email" type="email" required placeholder="you@example.com"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">사용자명</label>
        <input id="username" type="text" required placeholder="username"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">비밀번호</label>
        <input id="password" type="password" required placeholder="••••••••" minlength="6"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <button type="submit"
        class="w-full py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition">
        가입하기
      </button>
    </form>

    <p class="mt-5 text-center text-sm text-gray-400">
      이미 계정이 있으신가요?
      <a href="/login" class="text-blue-600 hover:underline font-medium">로그인</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  errEl.classList.add('hidden');

  const res = await fetch('/api/v1/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, username, password }),
  });

  if (res.ok) {
    // 가입 후 자동 로그인
    const loginRes = await fetch('/api/v1/auth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ username, password }),
    });
    const data = await loginRes.json();
    localStorage.setItem('access_token', data.access_token);
    document.cookie = `token=${data.access_token}; path=/; SameSite=Lax`;
    location.href = '/';
  } else {
    const data = await res.json().catch(() => ({}));
    errEl.textContent = data.detail || '회원가입에 실패했습니다.';
    errEl.classList.remove('hidden');
  }
});
</script>
{% endblock %}
