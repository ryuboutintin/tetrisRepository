{% extends "base.html" %}
{% block title %}로그인 — 메모장{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-8">
    <h1 class="text-2xl font-bold mb-1 text-center">📝 메모장</h1>
    <p class="text-gray-400 text-sm text-center mb-6">로그인하여 메모를 관리하세요</p>

    <div id="error-msg" class="hidden mb-4 px-3 py-2 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg"></div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">사용자명</label>
        <input id="username" type="text" required placeholder="username"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">비밀번호</label>
        <input id="password" type="password" required placeholder="••••••••"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <button type="submit"
        class="w-full py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition">
        로그인
      </button>
    </form>

    <p class="mt-5 text-center text-sm text-gray-400">
      계정이 없으신가요?
      <a href="/register" class="text-blue-600 hover:underline font-medium">회원가입</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  errEl.classList.add('hidden');

  const res = await fetch('/api/v1/auth/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ username, password }),
  });

  if (res.ok) {
    const data = await res.json();
    localStorage.setItem('access_token', data.access_token);
    document.cookie = `token=${data.access_token}; path=/; SameSite=Lax`;
    location.href = '/';
  } else {
    const data = await res.json().catch(() => ({}));
    errEl.textContent = data.detail || '로그인에 실패했습니다.';
    errEl.classList.remove('hidden');
  }
});
</script>
{% endblock %}
