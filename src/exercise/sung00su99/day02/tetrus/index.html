<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <link rel="stylesheet" href="./main/style.css">
</head>
<body>

<!-- Landing Page -->
<div id="landing">
  <h1>TETRIS</h1>
  <p class="subtitle">PRESS PLAY TO START</p>
  <div class="best-block">
    <div class="label">BEST SCORE</div>
    <div class="value" id="best-score-el">0</div>
  </div>
  <button onclick="enterGame()">▶ PLAY</button>
</div>

<!-- Game -->
<div id="game-wrapper">
  <div id="app">
    <div id="board-wrapper">
      <canvas id="board" width="300" height="600"></canvas>
      <div id="overlay">
        <h2 id="overlay-title">READY</h2>
        <button id="overlay-btn" onclick="startGame()">START</button>
      </div>
    </div>

    <div id="side-panel">
      <div class="panel-box">
        <h3>Next</h3>
        <canvas id="next-canvas" width="100" height="80"></canvas>
      </div>

      <div class="panel-box">
        <h3>Score</h3>
        <div class="stat-value" id="score-el">0</div>
      </div>

      <div class="panel-box">
        <h3>Lines</h3>
        <div class="stat-value" id="lines-el">0</div>
      </div>

      <div class="panel-box">
        <h3>Level</h3>
        <div class="stat-value" id="level-el">1</div>
      </div>

      <div class="panel-box">
        <button onclick="startGame()">RESTART</button>
      </div>

      <div class="panel-box" id="key-hints">
        <span>← →</span> 이동<br>
        <span>↑</span> 회전<br>
        <span>↓</span> 빠른 낙하<br>
        <span>Space</span> 즉시 낙하
      </div>
    </div>
  </div>
</div>

<script src="./main/script.js"></script>
</body>
</html>
