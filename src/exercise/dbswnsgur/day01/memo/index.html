<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메모장</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>메모장</h1>
    </header>

    <section class="form-section">
      <input id="input-title" type="text" placeholder="제목" maxlength="100" />
      <textarea id="input-content" placeholder="내용을 입력하세요..." rows="4"></textarea>
      <div class="form-actions">
        <button id="btn-cancel" class="btn btn-secondary hidden">취소</button>
        <button id="btn-submit" class="btn btn-primary">추가</button>
      </div>
    </section>

    <section class="list-section">
      <div id="memo-list"></div>
      <p id="empty-msg" class="empty-msg hidden">메모가 없습니다.</p>
    </section>
  </div>

  <!-- 삭제 확인 모달 -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <p>이 메모를 삭제할까요?</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-secondary">취소</button>
        <button id="modal-confirm" class="btn btn-danger">삭제</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
