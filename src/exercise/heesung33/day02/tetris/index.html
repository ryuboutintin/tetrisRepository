<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테트리스</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="landing">
        <div class="landing-bg"></div>
        <div class="landing-content">
            <h1 class="landing-title">TETRIS</h1>
            <p class="landing-subtitle">클래식 블록 퍼즐 게임</p>

            <div class="info-cards">
                <div class="info-card">
                    <h2>조작법</h2>
                    <div class="info-row"><kbd>←</kbd> <kbd>→</kbd> <span>좌우 이동</span></div>
                    <div class="info-row"><kbd>↑</kbd> <span>블록 회전</span></div>
                    <div class="info-row"><kbd>↓</kbd> <span>빠른 낙하 (1점/칸)</span></div>
                    <div class="info-row"><kbd>Space</kbd> <span>즉시 낙하 (2점/칸)</span></div>
                    <div class="info-row"><kbd>P</kbd> <span>일시정지</span></div>
                </div>

                <div class="info-card">
                    <h2>점수 계산</h2>
                    <table class="score-table">
                        <tr><td>1줄 클리어</td><td class="score-point">100 × 레벨</td></tr>
                        <tr><td>2줄 클리어</td><td class="score-point">300 × 레벨</td></tr>
                        <tr><td>3줄 클리어</td><td class="score-point">500 × 레벨</td></tr>
                        <tr><td>4줄 클리어 (테트리스!)</td><td class="score-point">800 × 레벨</td></tr>
                    </table>
                    <p class="info-note">10줄 클리어마다 레벨 업! 속도가 빨라집니다.</p>
                </div>

                <div class="info-card">
                    <h2>블록 종류</h2>
                    <div class="block-preview">
                        <span class="block-sample" style="color:#00f0f0">■■■■</span>
                        <span class="block-sample" style="color:#0000f0">■<br>■■■</span>
                        <span class="block-sample" style="color:#f0a000">&nbsp;&nbsp;■<br>■■■</span>
                        <span class="block-sample" style="color:#f0f000">■■<br>■■</span>
                        <span class="block-sample" style="color:#00f000">&nbsp;■■<br>■■</span>
                        <span class="block-sample" style="color:#a000f0">&nbsp;■<br>■■■</span>
                        <span class="block-sample" style="color:#f00000">■■<br>&nbsp;■■</span>
                    </div>
                </div>
            </div>

            <a href="game.html" class="play-btn">
                <span class="play-icon">▶</span> 게임 시작
            </a>
        </div>
    </div>
</body>
</html>
