<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메모장</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 인증 오버레이 -->
  <div class="auth-overlay hidden" id="authOverlay">
    <div class="auth-card">
      <h2 class="auth-title">메모장</h2>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">로그인</button>
        <button class="auth-tab" id="tabRegister">회원가입</button>
      </div>
      <form class="auth-form" id="authForm" autocomplete="off">
        <div class="auth-field">
          <input type="text" id="authUsername" placeholder="아이디 (3자 이상)"
                 autocomplete="username" maxlength="30" />
        </div>
        <div class="auth-field">
          <input type="password" id="authPassword" placeholder="비밀번호 (6자 이상)"
                 autocomplete="current-password" />
        </div>
        <button type="submit" class="auth-submit" id="authSubmit">로그인</button>
        <p class="auth-error hidden" id="authError"></p>
      </form>
    </div>
  </div>

  <div class="app">

    <aside class="sidebar">
      <!-- 상단 브랜드 -->
      <div class="sidebar-top">
        <h1 class="app-name" id="sidebarTitle">메모장</h1>
        <div class="sidebar-controls">
          <button class="ctrl-btn" id="themeToggle" title="테마 전환">🌙</button>
          <button class="ctrl-btn ctrl-btn--new" id="newMemoBtn" title="새 메모 (Ctrl+N)">+</button>
        </div>
      </div>

      <!-- 검색 -->
      <div class="sidebar-search">
        <input type="search" id="searchInput" placeholder="검색…" autocomplete="off" />
      </div>

      <!-- 태그 필터 -->
      <div class="tag-filter hidden" id="tagFilter"></div>

      <!-- 메모 목록 -->
      <ul class="memo-list" id="memoList"></ul>
      <p class="empty-msg" id="emptyMsg">아직 메모가 없어요</p>

      <!-- 사이드바 하단 -->
      <div class="sidebar-footer">
        <button class="footer-btn" id="trashBtn" title="휴지통">휴지통</button>
        <div class="footer-divider"></div>
        <button class="footer-btn" id="exportBtn" title="JSON으로 내보내기">내보내기</button>
        <label class="footer-btn" for="importFile" title="JSON 가져오기">가져오기</label>
        <input type="file" id="importFile" accept=".json" hidden />
        <div class="footer-divider"></div>
        <button class="footer-btn footer-btn--user" id="logoutBtn" title="로그아웃"></button>
      </div>
    </aside>

    <main class="editor">
      <div class="placeholder" id="placeholder">
        <span>메모를 선택하거나<br>새 메모를 만드세요</span>
      </div>

      <form class="write hidden" id="editForm" autocomplete="off">
        <div class="write-body">
          <input class="write-title" id="titleInput" type="text"
                 placeholder="제목" maxlength="200" />
          <textarea class="write-content" id="contentInput"
                    placeholder="내용을 적어보세요…" maxlength="50000"></textarea>
        </div>
        <div class="write-footer">
          <div class="tags-row">
            <span class="tag-hash">#</span>
            <input class="tag-input" id="tagsInput" type="text"
                   placeholder="태그 (쉼표로 구분)" />
          </div>
          <div class="footer-right">
            <span class="save-status" id="saveStatus"></span>
            <div class="action-row">
              <!-- 인라인 삭제 확인 -->
              <div class="del-confirm hidden" id="delConfirm">
                <span class="del-confirm__text">삭제할까요?</span>
                <button type="button" class="act-cancel" id="delCancel">취소</button>
                <button type="button" class="act-confirm-del" id="delConfirmBtn">삭제</button>
              </div>
              <button type="button" class="act-delete" id="deleteBtn">삭제</button>
              <button type="submit" class="act-save" id="saveBtn">저장</button>
            </div>
          </div>
        </div>
      </form>
    </main>

  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
