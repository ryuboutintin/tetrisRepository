<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memo App</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">FASTAPI + SQLITE</p>
      <h1>Memo CRUD Dashboard</h1>
      <p class="hero-copy">메모를 작성, 수정, 삭제할 수 있는 간단한 노트 앱입니다.</p>
    </section>

    <section class="workspace">
      <form id="memo-form" class="editor-card">
        <div class="editor-head">
          <div>
            <h2 id="form-title">새 메모 작성</h2>
            <p>제목과 내용을 입력한 뒤 저장하세요.</p>
          </div>
          <button type="button" id="reset-button" class="ghost-button">초기화</button>
        </div>

        <label for="title">제목</label>
        <input id="title" name="title" type="text" maxlength="100" placeholder="예: 팀 회의 메모" required />

        <label for="content">내용</label>
        <textarea id="content" name="content" maxlength="5000" placeholder="메모 내용을 입력하세요."></textarea>

        <div class="actions">
          <button type="submit" id="submit-button">저장</button>
          <span id="status-text" class="status-text">대기 중</span>
        </div>
      </form>

      <section class="list-card">
        <div class="list-head">
          <div>
            <h2>메모 목록</h2>
            <p>최근 수정된 메모가 먼저 표시됩니다.</p>
          </div>
          <button type="button" id="refresh-button" class="ghost-button">새로고침</button>
        </div>

        <ul id="memo-list" class="memo-list"></ul>
        <p id="empty-state" class="empty-state">아직 저장된 메모가 없습니다.</p>
      </section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
