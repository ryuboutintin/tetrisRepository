<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memo CRUD</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #20242a;
        --muted: #69717d;
        --line: #d9dee5;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --danger: #dc2626;
        --danger-hover: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(100% - 32px, 920px);
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }

      .count {
        color: var(--muted);
        font-size: 14px;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 18px;
        align-items: start;
      }

      .panel,
      .memo {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .panel {
        padding: 18px;
        position: sticky;
        top: 18px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
        font-weight: 650;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        padding: 10px 11px;
        outline: none;
      }

      textarea {
        min-height: 150px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgb(37 99 235 / 14%);
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      button {
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 40px;
        padding: 0 14px;
      }

      .primary {
        background: var(--primary);
        color: #fff;
      }

      .primary:hover {
        background: var(--primary-hover);
      }

      .secondary {
        background: #eef1f5;
        color: var(--text);
      }

      .secondary:hover {
        background: #e2e7ef;
      }

      .danger {
        background: #fee2e2;
        color: var(--danger);
      }

      .danger:hover {
        background: var(--danger);
        color: #fff;
      }

      .memo-list {
        display: grid;
        gap: 12px;
      }

      .memo {
        padding: 16px;
      }

      .memo-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }

      .memo h2 {
        margin: 0;
        font-size: 18px;
        line-height: 1.3;
        overflow-wrap: anywhere;
      }

      .memo p {
        margin: 10px 0 14px;
        color: #333942;
        line-height: 1.55;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
      }

      .memo-buttons {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      .memo-buttons button {
        min-height: 34px;
        padding: 0 10px;
        font-size: 13px;
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        padding: 28px;
        text-align: center;
      }

      .error {
        display: none;
        color: var(--danger);
        font-size: 14px;
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 24px, 920px);
          padding: 22px 0;
        }

        header,
        .memo-head {
          display: grid;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .panel {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>메모장</h1>
          <div class="count" id="memoCount">0개의 메모</div>
        </div>
      </header>

      <section class="layout" aria-label="메모 CRUD">
        <aside class="panel">
          <form id="memoForm">
            <input type="hidden" id="memoId" />
            <label>
              제목
              <input id="title" name="title" maxlength="100" required autocomplete="off" />
            </label>
            <label>
              내용
              <textarea id="content" name="content" maxlength="2000" required></textarea>
            </label>
            <div class="error" id="errorMessage"></div>
            <div class="actions">
              <button class="primary" id="submitButton" type="submit">추가</button>
              <button class="secondary" id="cancelButton" type="button" hidden>취소</button>
            </div>
          </form>
        </aside>

        <section class="memo-list" id="memoList" aria-live="polite"></section>
      </section>
    </main>

    <script>
      const form = document.querySelector("#memoForm");
      const memoId = document.querySelector("#memoId");
      const title = document.querySelector("#title");
      const content = document.querySelector("#content");
      const memoList = document.querySelector("#memoList");
      const memoCount = document.querySelector("#memoCount");
      const submitButton = document.querySelector("#submitButton");
      const cancelButton = document.querySelector("#cancelButton");
      const errorMessage = document.querySelector("#errorMessage");

      let memos = [];

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = message ? "block" : "none";
      }

      function resetForm() {
        form.reset();
        memoId.value = "";
        submitButton.textContent = "추가";
        cancelButton.hidden = true;
        showError("");
      }

      function renderMemos() {
        memoCount.textContent = `${memos.length}개의 메모`;

        if (memos.length === 0) {
          memoList.innerHTML = '<div class="empty">등록된 메모가 없습니다.</div>';
          return;
        }

        memoList.innerHTML = memos
          .map(
            (memo) => `
              <article class="memo">
                <div class="memo-head">
                  <div>
                    <h2>${escapeHtml(memo.title)}</h2>
                    <div class="meta">수정: ${formatDate(memo.updated_at)}</div>
                  </div>
                  <div class="memo-buttons">
                    <button class="secondary" type="button" onclick="startEdit(${memo.id})">수정</button>
                    <button class="danger" type="button" onclick="deleteMemo(${memo.id})">삭제</button>
                  </div>
                </div>
                <p>${escapeHtml(memo.content)}</p>
              </article>
            `,
          )
          .join("");
      }

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => {
          const entities = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;",
          };
          return entities[char];
        });
      }

      function formatDate(value) {
        return new Date(`${value}Z`).toLocaleString("ko-KR", {
          dateStyle: "medium",
          timeStyle: "short",
        });
      }

      async function requestJson(url, options = {}) {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.detail || "요청을 처리하지 못했습니다.");
        }

        if (response.status === 204) {
          return null;
        }

        return response.json();
      }

      async function loadMemos() {
        memos = await requestJson("/api/memos");
        renderMemos();
      }

      function startEdit(id) {
        const memo = memos.find((item) => item.id === id);
        if (!memo) return;

        memoId.value = memo.id;
        title.value = memo.title;
        content.value = memo.content;
        submitButton.textContent = "수정";
        cancelButton.hidden = false;
        title.focus();
      }

      async function deleteMemo(id) {
        if (!confirm("메모를 삭제할까요?")) return;

        try {
          await requestJson(`/api/memos/${id}`, { method: "DELETE" });
          if (memoId.value === String(id)) {
            resetForm();
          }
          await loadMemos();
        } catch (error) {
          showError(error.message);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        showError("");

        const payload = {
          title: title.value.trim(),
          content: content.value.trim(),
        };

        if (!payload.title || !payload.content) {
          showError("제목과 내용을 입력하세요.");
          return;
        }

        try {
          const id = memoId.value;
          await requestJson(id ? `/api/memos/${id}` : "/api/memos", {
            method: id ? "PUT" : "POST",
            body: JSON.stringify(payload),
          });
          resetForm();
          await loadMemos();
        } catch (error) {
          showError(error.message);
        }
      });

      cancelButton.addEventListener("click", resetForm);
      loadMemos().catch((error) => showError(error.message));
    </script>
  </body>
</html>
