<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 랜딩 페이지</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 프로필 사진 섹션 -->
        <section class="profile-section">
            <div class="profile-image">
                <img src="https://via.placeholder.com/200" alt="프로필 사진">
            </div>
        </section>

        <!-- 소개 섹션 -->
        <section class="intro-section">
            <h1 class="name">홍길동</h1>
            <p class="title">풀스택 개발자</p>
            <p class="description">
                안녕하세요! 웹 개발에 열정을 가진 개발자입니다.<br>
                사용자 경험을 최우선으로 생각하며, 깔끔하고 효율적인 코드를 작성합니다.
            </p>
        </section>

        <!-- SNS 링크 섹션 -->
        <section class="social-section">
            <h2>연락하기</h2>
            <div class="social-links">
                <a href="https://github.com" class="social-link github" target="_blank">
                    <span>GitHub</span>
                </a>
                <a href="https://linkedin.com" class="social-link linkedin" target="_blank">
                    <span>LinkedIn</span>
                </a>
                <a href="https://twitter.com" class="social-link twitter" target="_blank">
                    <span>Twitter</span>
                </a>
                <a href="mailto:example@email.com" class="social-link email">
                    <span>Email</span>
                </a>
            </div>
        </section>
    </div>
</body>
</html>
