<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메모장</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e2e;
      --surface: #27273a;
      --border: #3a3a52;
      --accent: #7c6af7;
      --text: #cdd6f4;
      --text-muted: #6c7086;
      --danger: #f38ba8;
    }

    body {
      display: flex;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── 사이드바 ── */
    .sidebar {
      width: 280px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar-header h1 { font-size: 1.1rem; color: var(--accent); }

    #btn-new {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    #btn-new:hover { opacity: 0.85; }

    #search {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      width: 100%;
    }
    #search::placeholder { color: var(--text-muted); }

    .memo-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .memo-item {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s;
    }
    .memo-item:hover { background: rgba(124,106,247,0.1); }
    .memo-item.active {
      background: rgba(124,106,247,0.15);
      border-left-color: var(--accent);
    }
    .memo-item-title {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .memo-item-date {
      font-size: 0.73rem;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .empty-list {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 40px 16px;
    }

    /* ── 편집 영역 ── */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      gap: 10px;
    }

    #memo-title {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 700;
    }
    #memo-title::placeholder { color: var(--text-muted); }

    .toolbar-btns { display: flex; gap: 8px; }

    .toolbar-btns button {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.12s;
    }
    .toolbar-btns button:hover { background: rgba(124,106,247,0.2); }
    #btn-delete {
      color: var(--danger);
      border-color: var(--danger);
    }
    #btn-delete:hover { background: rgba(243,139,168,0.15); }

    #memo-content {
      flex: 1;
      resize: none;
      background: var(--bg);
      color: var(--text);
      border: none;
      outline: none;
      padding: 24px 28px;
      font-size: 0.95rem;
      line-height: 1.75;
      font-family: inherit;
    }

    .status-bar {
      padding: 5px 20px;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .placeholder-msg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>📝 메모장</h1>
    <button id="btn-new">+ 새 메모</button>
    <input id="search" type="text" placeholder="메모 검색..." />
  </div>
  <div class="memo-list" id="memo-list"></div>
</aside>

<main class="editor-area" id="editor-area">
  <div class="placeholder-msg" id="placeholder">메모를 선택하거나 새 메모를 만드세요.</div>
</main>

<script>
const API = '/memos';
let memos = [];
let currentId = null;
let saveTimer = null;

const memoList = document.getElementById('memo-list');
const editorArea = document.getElementById('editor-area');
const placeholder = document.getElementById('placeholder');
const search = document.getElementById('search');

// ── 렌더링 ─────────────────────────────────────────────────────
function renderList(filter = '') {
  const keyword = filter.toLowerCase();
  const filtered = memos.filter(m =>
    m.title.toLowerCase().includes(keyword) ||
    m.content.toLowerCase().includes(keyword)
  );

  memoList.innerHTML = filtered.length === 0
    ? `<div class="empty-list">메모가 없습니다.</div>`
    : filtered.map(m => `
        <div class="memo-item ${m.id === currentId ? 'active' : ''}" data-id="${m.id}">
          <div class="memo-item-title">${escHtml(m.title || '제목 없음')}</div>
          <div class="memo-item-date">${m.updated_at.replace('T', ' ')}</div>
        </div>`).join('');

  memoList.querySelectorAll('.memo-item').forEach(el => {
    el.addEventListener('click', () => openMemo(Number(el.dataset.id)));
  });
}

function showEditor(memo) {
  placeholder.style.display = 'none';

  let existing = editorArea.querySelector('.editor-toolbar');
  if (!existing) {
    editorArea.insertAdjacentHTML('beforeend', `
      <div class="editor-toolbar">
        <input id="memo-title" type="text" placeholder="제목" />
        <div class="toolbar-btns">
          <button id="btn-save">저장</button>
          <button id="btn-delete">삭제</button>
        </div>
      </div>
      <textarea id="memo-content" placeholder="내용을 입력하세요..."></textarea>
      <div class="status-bar" id="status-bar">저장됨</div>
    `);
    document.getElementById('btn-save').addEventListener('click', saveCurrentMemo);
    document.getElementById('btn-delete').addEventListener('click', deleteCurrentMemo);
    document.getElementById('memo-title').addEventListener('input', scheduleSave);
    document.getElementById('memo-content').addEventListener('input', scheduleSave);
  }

  document.getElementById('memo-title').value = memo.title;
  document.getElementById('memo-content').value = memo.content;
  document.getElementById('status-bar').textContent = '저장됨';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── API 호출 ────────────────────────────────────────────────────
async function fetchMemos() {
  const res = await fetch(API);
  memos = await res.json();
  memos.sort((a, b) => b.updated_at.localeCompare(a.updated_at));
  renderList(search.value);
}

async function openMemo(id) {
  currentId = id;
  const res = await fetch(`${API}/${id}`);
  const memo = await res.json();
  showEditor(memo);
  renderList(search.value);
}

async function createMemo() {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: '새 메모', content: '' }),
  });
  const memo = await res.json();
  memos.unshift(memo);
  renderList(search.value);
  openMemo(memo.id);
}

async function saveCurrentMemo() {
  if (!currentId) return;
  const title = document.getElementById('memo-title').value;
  const content = document.getElementById('memo-content').value;
  const res = await fetch(`${API}/${currentId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, content }),
  });
  const updated = await res.json();
  const idx = memos.findIndex(m => m.id === currentId);
  if (idx !== -1) memos[idx] = updated;
  memos.sort((a, b) => b.updated_at.localeCompare(a.updated_at));
  document.getElementById('status-bar').textContent = `저장됨 ✓  ${updated.updated_at.replace('T',' ')}`;
  renderList(search.value);
}

async function deleteCurrentMemo() {
  if (!currentId) return;
  if (!confirm('이 메모를 삭제하시겠습니까?')) return;
  await fetch(`${API}/${currentId}`, { method: 'DELETE' });
  memos = memos.filter(m => m.id !== currentId);
  currentId = null;

  // 편집 영역 초기화
  editorArea.querySelector('.editor-toolbar')?.remove();
  editorArea.querySelector('textarea')?.remove();
  editorArea.querySelector('.status-bar')?.remove();
  placeholder.style.display = '';

  renderList(search.value);
}

// ── 자동저장 ────────────────────────────────────────────────────
function scheduleSave() {
  const bar = document.getElementById('status-bar');
  if (bar) bar.textContent = '저장 중...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrentMemo, 800);
}

// ── 이벤트 ─────────────────────────────────────────────────────
document.getElementById('btn-new').addEventListener('click', createMemo);
search.addEventListener('input', () => renderList(search.value));

// ── 초기 로드 ───────────────────────────────────────────────────
fetchMemos();
</script>
</body>
</html>
