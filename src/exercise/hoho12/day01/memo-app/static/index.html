<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메모장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f0f17;
      --surface:     #16161f;
      --surface2:    #1e1e2e;
      --border:      #2a2a3d;
      --border-soft: #22223a;
      --accent:      #7c6af7;
      --accent2:     #a78bfa;
      --accent-glow: rgba(124,106,247,0.18);
      --text:        #e2e8f4;
      --text-sub:    #9ca3b8;
      --text-muted:  #555672;
      --danger:      #f87171;
      --success:     #34d399;
      --radius:      12px;
      --radius-sm:   8px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    body { display: flex; overflow: hidden; }

    /* ════════════════════════════════
       SIDEBAR
    ════════════════════════════════ */
    .sidebar {
      width: 270px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-top {
      padding: 20px 16px 14px;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .app-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(124,106,247,0.35);
    }

    .app-title-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .btn-new {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--accent), #9f7aea);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 10px rgba(124,106,247,0.3);
    }
    .btn-new:hover { opacity: 0.88; }
    .btn-new:active { transform: scale(0.98); }

    .search-wrap {
      position: relative;
      margin-top: 10px;
    }
    .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px 8px 32px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .list-label {
      padding: 14px 16px 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .memo-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 12px;
    }
    .memo-list::-webkit-scrollbar { width: 4px; }
    .memo-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .memo-item {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.12s;
      border: 1px solid transparent;
      margin-bottom: 2px;
    }
    .memo-item:hover { background: var(--surface2); }
    .memo-item.active {
      background: var(--accent-glow);
      border-color: rgba(124,106,247,0.3);
    }
    .memo-item-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .memo-item.active .memo-item-title { color: var(--accent2); }
    .memo-item-preview {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .memo-item-date {
      font-size: 10.5px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .empty-list {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 48px 16px;
      line-height: 1.8;
    }
    .empty-list .empty-icon { font-size: 32px; display: block; margin-bottom: 10px; }

    .memo-count {
      padding: 10px 16px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* ════════════════════════════════
       EDITOR
    ════════════════════════════════ */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .editor-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border-soft);
      background: var(--surface);
      flex-shrink: 0;
    }

    .title-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: -0.02em;
    }
    .title-input::placeholder { color: var(--text-muted); font-weight: 400; }

    .header-actions { display: flex; gap: 6px; align-items: center; }

    .btn-icon {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-sub);
      cursor: pointer;
      font-size: 15px;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .btn-icon:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent2); }
    .btn-icon.danger:hover { background: rgba(248,113,113,0.12); border-color: var(--danger); color: var(--danger); }

    .btn-save-text {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent2);
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s;
    }
    .btn-save-text:hover { background: var(--accent-glow); }

    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-input {
      flex: 1;
      resize: none;
      background: transparent;
      color: var(--text);
      border: none;
      outline: none;
      padding: 28px 32px;
      font-size: 14.5px;
      line-height: 1.85;
      font-family: inherit;
    }
    .content-input::placeholder { color: var(--text-muted); }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 28px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border-soft);
      background: var(--surface);
      flex-shrink: 0;
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 5px;
      vertical-align: middle;
    }
    .status-dot.saving { background: var(--accent); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* placeholder 화면 */
    .placeholder-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--text-muted);
    }
    .placeholder-screen .ph-icon {
      font-size: 48px;
      opacity: 0.4;
    }
    .placeholder-screen p {
      font-size: 14px;
      opacity: 0.7;
    }
    .placeholder-screen .ph-hint {
      font-size: 12px;
      opacity: 0.45;
    }
  </style>
</head>
<body>

<!-- ── 사이드바 ──────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="app-title">
      <div class="app-icon">📝</div>
      <span class="app-title-text">메모장</span>
    </div>
    <button class="btn-new" id="btn-new">
      <span>＋</span> 새 메모
    </button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search" type="text" placeholder="검색..." />
    </div>
  </div>

  <div class="list-label">메모 목록</div>
  <div class="memo-list" id="memo-list"></div>
  <div class="memo-count" id="memo-count"></div>
</aside>

<!-- ── 에디터 ────────────────────────────────────────────── -->
<main class="editor-area" id="editor-area">
  <div class="placeholder-screen" id="placeholder">
    <span class="ph-icon">🗒️</span>
    <p>메모를 선택하거나 새로 만드세요</p>
    <span class="ph-hint">← 왼쪽에서 메모를 고르거나 "새 메모" 버튼을 누르세요</span>
  </div>
</main>

<script>
const API = '/memos';
let memos = [];
let currentId = null;
let saveTimer = null;

const memoList   = document.getElementById('memo-list');
const memoCount  = document.getElementById('memo-count');
const editorArea = document.getElementById('editor-area');
const placeholder= document.getElementById('placeholder');
const search     = document.getElementById('search');

// ── 유틸 ──────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtDate(iso) {
  const d = new Date(iso);
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  if (isToday) return d.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
  return d.toLocaleDateString('ko-KR', { month:'short', day:'numeric' });
}

// ── 렌더링 ────────────────────────────────────────────────────
function renderList(filter = '') {
  const kw = filter.toLowerCase();
  const filtered = memos.filter(m =>
    m.title.toLowerCase().includes(kw) || m.content.toLowerCase().includes(kw)
  );

  memoCount.textContent = `메모 ${filtered.length}개`;

  if (filtered.length === 0) {
    memoList.innerHTML = `
      <div class="empty-list">
        <span class="empty-icon">${filter ? '🔍' : '✏️'}</span>
        ${filter ? '검색 결과가 없습니다.' : '메모가 없습니다.<br/>새 메모를 만들어보세요.'}
      </div>`;
    return;
  }

  memoList.innerHTML = filtered.map(m => `
    <div class="memo-item ${m.id === currentId ? 'active' : ''}" data-id="${m.id}">
      <div class="memo-item-title">${esc(m.title || '제목 없음')}</div>
      <div class="memo-item-preview">${esc(m.content.slice(0, 50)) || '내용 없음'}</div>
      <div class="memo-item-date">${fmtDate(m.updated_at)}</div>
    </div>`).join('');

  memoList.querySelectorAll('.memo-item').forEach(el =>
    el.addEventListener('click', () => openMemo(Number(el.dataset.id)))
  );
}

function showEditor(memo) {
  placeholder.style.display = 'none';

  if (!editorArea.querySelector('.editor-header')) {
    editorArea.insertAdjacentHTML('beforeend', `
      <div class="editor-header">
        <input class="title-input" id="memo-title" type="text" placeholder="제목을 입력하세요" />
        <div class="header-actions">
          <button class="btn-save-text" id="btn-save">💾 저장</button>
          <button class="btn-icon danger" id="btn-delete" title="삭제">🗑️</button>
        </div>
      </div>
      <div class="content-area">
        <textarea class="content-input" id="memo-content" placeholder="내용을 입력하세요..."></textarea>
      </div>
      <div class="status-bar">
        <span id="status-msg"><span class="status-dot" id="status-dot"></span>저장됨</span>
        <span id="status-date"></span>
      </div>
    `);
    document.getElementById('btn-save').addEventListener('click', saveCurrentMemo);
    document.getElementById('btn-delete').addEventListener('click', deleteCurrentMemo);
    document.getElementById('memo-title').addEventListener('input', scheduleSave);
    document.getElementById('memo-content').addEventListener('input', scheduleSave);
  }

  document.getElementById('memo-title').value = memo.title;
  document.getElementById('memo-content').value = memo.content;
  setStatus('saved', memo.updated_at);
}

function setStatus(state, dateStr = '') {
  const dot = document.getElementById('status-dot');
  const msg = document.getElementById('status-msg');
  const dateEl = document.getElementById('status-date');
  if (!dot) return;

  if (state === 'saving') {
    dot.className = 'status-dot saving';
    msg.innerHTML = '<span class="status-dot saving" id="status-dot"></span>저장 중...';
  } else {
    dot.className = 'status-dot';
    msg.innerHTML = '<span class="status-dot" id="status-dot"></span>저장됨';
  }
  dateEl.textContent = dateStr ? dateStr.replace('T', ' ') : '';
}

// ── API ───────────────────────────────────────────────────────
async function fetchMemos() {
  const res = await fetch(API);
  memos = await res.json();
  memos.sort((a, b) => b.updated_at.localeCompare(a.updated_at));
  renderList(search.value);
}

async function openMemo(id) {
  currentId = id;
  const res = await fetch(`${API}/${id}`);
  const memo = await res.json();
  showEditor(memo);
  renderList(search.value);
  document.getElementById('memo-content')?.focus();
}

async function createMemo() {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: '', content: '' }),
  });
  const memo = await res.json();
  memos.unshift(memo);
  renderList(search.value);
  openMemo(memo.id);
}

async function saveCurrentMemo() {
  if (!currentId) return;
  clearTimeout(saveTimer);
  const title   = document.getElementById('memo-title')?.value ?? '';
  const content = document.getElementById('memo-content')?.value ?? '';
  const res = await fetch(`${API}/${currentId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, content }),
  });
  const updated = await res.json();
  const idx = memos.findIndex(m => m.id === currentId);
  if (idx !== -1) memos[idx] = updated;
  memos.sort((a, b) => b.updated_at.localeCompare(a.updated_at));
  setStatus('saved', updated.updated_at);
  renderList(search.value);
}

async function deleteCurrentMemo() {
  if (!currentId) return;
  if (!confirm('이 메모를 삭제하시겠습니까?')) return;
  await fetch(`${API}/${currentId}`, { method: 'DELETE' });
  memos = memos.filter(m => m.id !== currentId);
  currentId = null;

  editorArea.querySelector('.editor-header')?.remove();
  editorArea.querySelector('.content-area')?.remove();
  editorArea.querySelector('.status-bar')?.remove();
  placeholder.style.display = '';

  renderList(search.value);
}

function scheduleSave() {
  setStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrentMemo, 800);
}

// ── 키보드 단축키 ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveCurrentMemo();
  }
});

document.getElementById('btn-new').addEventListener('click', createMemo);
search.addEventListener('input', () => renderList(search.value));

fetchMemos();
</script>
</body>
</html>
