<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메모장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #0f0f17;
      --surface:     #16161f;
      --surface2:    #1e1e2e;
      --border:      #2a2a3d;
      --border-soft: #22223a;
      --accent:      #7c6af7;
      --accent2:     #a78bfa;
      --accent-glow: rgba(124,106,247,0.18);
      --text:        #e2e8f4;
      --text-sub:    #9ca3b8;
      --text-muted:  #555672;
      --danger:      #f87171;
      --success:     #34d399;
      --tag-bg:      rgba(124,106,247,0.15);
      --radius:      12px;
      --radius-sm:   8px;
    }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; -webkit-font-smoothing: antialiased; }
    body { display: flex; overflow: hidden; }

    /* ══ AUTH OVERLAY ══════════════════════════════════════ */
    .auth-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .auth-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .auth-logo .icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(124,106,247,0.35);
    }
    .auth-logo span { font-size: 17px; font-weight: 700; }
    .auth-tabs {
      display: flex; gap: 4px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 3px;
      margin-bottom: 22px;
    }
    .auth-tab {
      flex: 1; padding: 7px;
      border: none; background: transparent;
      color: var(--text-muted); font-size: 13px; font-weight: 600;
      border-radius: 6px; cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .auth-tab.active { background: var(--accent); color: #fff; }
    .auth-field { margin-bottom: 14px; }
    .auth-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
    .auth-input {
      width: 100%;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      color: var(--text); font-size: 13px; font-family: inherit;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .auth-error { font-size: 12px; color: var(--danger); margin-bottom: 12px; min-height: 16px; }
    .auth-submit {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, var(--accent), #9f7aea);
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 2px 10px rgba(124,106,247,0.3);
      margin-top: 4px;
    }
    .auth-submit:hover { opacity: 0.88; }
    .auth-submit:active { transform: scale(0.98); }

    /* ══ LAYOUT ══════════════════════════════════════════════ */
    .sidebar {
      width: 270px; display: flex; flex-direction: column;
      background: var(--surface); border-right: 1px solid var(--border); flex-shrink: 0;
    }
    .sidebar-top { padding: 16px 16px 10px; }
    .app-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .app-title { display: flex; align-items: center; gap: 8px; }
    .app-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 14px; box-shadow: 0 3px 10px rgba(124,106,247,0.3);
    }
    .app-title-text { font-size: 14px; font-weight: 700; }
    .btn-logout {
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px;
      color: var(--text-muted); font-size: 11px; cursor: pointer; font-family: inherit;
      transition: all 0.12s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }
    .btn-new {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
      background: linear-gradient(135deg, var(--accent), #9f7aea);
      color: #fff; border: none; border-radius: var(--radius-sm);
      padding: 8px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 2px 10px rgba(124,106,247,0.3);
      transition: opacity 0.15s, transform 0.1s; margin-bottom: 10px;
    }
    .btn-new:hover { opacity: 0.88; } .btn-new:active { transform: scale(0.98); }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 12px; pointer-events: none; }
    .search-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 7px 10px 7px 30px;
      color: var(--text); font-size: 13px; font-family: inherit; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    /* 태그 필터 */
    .tag-filter-section { padding: 8px 16px 4px; }
    .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
    .tag-filter-list { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag-chip {
      padding: 3px 9px; border-radius: 20px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-sub); font-size: 11px; cursor: pointer;
      transition: all 0.12s; white-space: nowrap;
    }
    .tag-chip:hover { border-color: var(--accent); color: var(--accent2); }
    .tag-chip.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent2); font-weight: 600; }

    .list-label { padding: 10px 16px 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .memo-list { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
    .memo-list::-webkit-scrollbar { width: 4px; }
    .memo-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .memo-item {
      padding: 10px 12px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background 0.12s;
      border: 1px solid transparent; margin-bottom: 2px;
    }
    .memo-item:hover { background: var(--surface2); }
    .memo-item.active { background: var(--accent-glow); border-color: rgba(124,106,247,0.3); }
    .memo-item-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .memo-item.active .memo-item-title { color: var(--accent2); }
    .memo-item-preview { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .memo-item-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
    .memo-item-date { font-size: 10.5px; color: var(--text-muted); }
    .memo-item-tags { display: flex; gap: 3px; flex-wrap: wrap; }
    .tag-badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--tag-bg); color: var(--accent2); }

    .empty-list { text-align: center; color: var(--text-muted); font-size: 13px; padding: 48px 16px; line-height: 1.8; }
    .empty-list .empty-icon { font-size: 32px; display: block; margin-bottom: 10px; }
    .memo-count { padding: 10px 16px; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border); }

    /* ══ EDITOR ══════════════════════════════════════════════ */
    .editor-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
    .editor-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 28px; border-bottom: 1px solid var(--border-soft);
      background: var(--surface); flex-shrink: 0;
    }
    .title-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 17px; font-weight: 700; font-family: inherit; letter-spacing: -0.02em; }
    .title-input::placeholder { color: var(--text-muted); font-weight: 400; }
    .header-actions { display: flex; gap: 6px; align-items: center; }
    .btn-save-text {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--accent); background: transparent;
      color: var(--accent2); font-size: 12.5px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.12s;
    }
    .btn-save-text:hover { background: var(--accent-glow); }
    .btn-icon {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: transparent; color: var(--text-sub); cursor: pointer; font-size: 15px;
      transition: all 0.12s;
    }
    .btn-icon:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent2); }
    .btn-icon.danger:hover { background: rgba(248,113,113,0.12); border-color: var(--danger); color: var(--danger); }

    /* 태그 입력 영역 */
    .tag-input-area {
      display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
      padding: 8px 28px; border-bottom: 1px solid var(--border-soft);
      background: var(--surface); min-height: 42px;
    }
    .tag-input-label { font-size: 11px; color: var(--text-muted); font-weight: 600; flex-shrink: 0; }
    .tag-chip-editor {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 20px;
      background: var(--tag-bg); border: 1px solid rgba(124,106,247,0.3);
      color: var(--accent2); font-size: 11.5px;
    }
    .tag-chip-editor button {
      background: none; border: none; color: var(--accent2); cursor: pointer;
      font-size: 13px; line-height: 1; padding: 0; opacity: 0.7;
    }
    .tag-chip-editor button:hover { opacity: 1; }
    .tag-text-input {
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 12px; font-family: inherit;
      min-width: 80px; flex: 1;
    }
    .tag-text-input::placeholder { color: var(--text-muted); }

    .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .content-input { flex: 1; resize: none; background: transparent; color: var(--text); border: none; outline: none; padding: 24px 32px; font-size: 14.5px; line-height: 1.85; font-family: inherit; }
    .content-input::placeholder { color: var(--text-muted); }
    .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 28px; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border-soft); background: var(--surface); flex-shrink: 0; }
    .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--success); margin-right: 5px; vertical-align: middle; }
    .status-dot.saving { background: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .placeholder-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--text-muted); }
    .placeholder-screen .ph-icon { font-size: 48px; opacity: 0.4; }
    .placeholder-screen p { font-size: 14px; opacity: 0.7; }
    .placeholder-screen .ph-hint { font-size: 12px; opacity: 0.45; }
  </style>
</head>
<body>

<!-- ══ AUTH OVERLAY ═══════════════════════════════════════════ -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">📝</div>
      <span>메모장</span>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">회원가입</button>
    </div>
    <div class="auth-field">
      <label>사용자명</label>
      <input class="auth-input" id="auth-username" type="text" placeholder="username" autocomplete="username" />
    </div>
    <div class="auth-field">
      <label>비밀번호</label>
      <input class="auth-input" id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-submit" id="auth-submit" onclick="submitAuth()">로그인</button>
  </div>
</div>

<!-- ══ SIDEBAR ════════════════════════════════════════════════ -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="app-bar">
      <div class="app-title">
        <div class="app-icon">📝</div>
        <span class="app-title-text">메모장</span>
      </div>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
    <button class="btn-new" id="btn-new">＋ 새 메모</button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search" type="text" placeholder="검색..." />
    </div>
  </div>

  <div class="tag-filter-section">
    <div class="section-label">태그 필터</div>
    <div class="tag-filter-list" id="tag-filter-list"></div>
  </div>

  <div class="list-label">메모 목록</div>
  <div class="memo-list" id="memo-list"></div>
  <div class="memo-count" id="memo-count"></div>
</aside>

<!-- ══ EDITOR ════════════════════════════════════════════════ -->
<main class="editor-area" id="editor-area">
  <div class="placeholder-screen" id="placeholder">
    <span class="ph-icon">🗒️</span>
    <p>메모를 선택하거나 새로 만드세요</p>
    <span class="ph-hint">← 왼쪽에서 메모를 고르거나 "새 메모" 버튼을 누르세요</span>
  </div>
</main>

<script>
const API = '/memos';
let memos = [], allTags = [], currentId = null, saveTimer = null;
let activeTagFilter = null, authMode = 'login';

// ── 인증 ──────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('memo-token'); }
function setToken(t) { localStorage.setItem('memo-token', t); }
function removeToken() { localStorage.removeItem('memo-token'); }

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
}

function switchTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-register').classList.toggle('active', mode === 'register');
  document.getElementById('auth-submit').textContent = mode === 'login' ? '로그인' : '회원가입';
  document.getElementById('auth-error').textContent = '';
}

async function submitAuth() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  if (!username || !password) { errEl.textContent = '사용자명과 비밀번호를 입력하세요.'; return; }

  try {
    let res;
    if (authMode === 'login') {
      const body = new URLSearchParams({ username, password });
      res = await fetch('/auth/login', { method: 'POST', body });
    } else {
      res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
    }
    if (!res.ok) {
      const data = await res.json();
      errEl.textContent = data.detail || '오류가 발생했습니다.';
      return;
    }
    const data = await res.json();
    setToken(data.access_token);
    document.getElementById('auth-overlay').style.display = 'none';
    initApp();
  } catch {
    errEl.textContent = '서버에 연결할 수 없습니다.';
  }
}

function logout() {
  removeToken();
  location.reload();
}

// ── 유틸 ──────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso) {
  const d = new Date(iso), today = new Date();
  return d.toDateString() === today.toDateString()
    ? d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
    : d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
}

// ── 렌더링 ────────────────────────────────────────────────────
function renderTagFilter() {
  const el = document.getElementById('tag-filter-list');
  if (allTags.length === 0) { el.innerHTML = '<span style="font-size:11px;color:var(--text-muted)">태그 없음</span>'; return; }
  el.innerHTML = allTags.map(t => `
    <span class="tag-chip ${activeTagFilter === t ? 'active' : ''}" data-tag="${esc(t)}">#${esc(t)}</span>
  `).join('');
  el.querySelectorAll('.tag-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const tag = chip.dataset.tag;
      activeTagFilter = activeTagFilter === tag ? null : tag;
      renderTagFilter();
      renderList(document.getElementById('search').value);
    });
  });
}

function renderList(filter = '') {
  const kw = filter.toLowerCase();
  let filtered = memos.filter(m =>
    m.title.toLowerCase().includes(kw) || m.content.toLowerCase().includes(kw)
  );
  if (activeTagFilter) filtered = filtered.filter(m => m.tags.includes(activeTagFilter));

  document.getElementById('memo-count').textContent = `메모 ${filtered.length}개`;
  const el = document.getElementById('memo-list');

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-list"><span class="empty-icon">${filter || activeTagFilter ? '🔍' : '✏️'}</span>${filter || activeTagFilter ? '검색 결과가 없습니다.' : '메모가 없습니다.<br/>새 메모를 만들어보세요.'}</div>`;
    return;
  }

  el.innerHTML = filtered.map(m => `
    <div class="memo-item ${m.id === currentId ? 'active' : ''}" data-id="${m.id}">
      <div class="memo-item-title">${esc(m.title || '제목 없음')}</div>
      <div class="memo-item-preview">${esc(m.content.slice(0, 50)) || '내용 없음'}</div>
      <div class="memo-item-footer">
        <span class="memo-item-date">${fmtDate(m.updated_at)}</span>
        <span class="memo-item-tags">${m.tags.slice(0,3).map(t=>`<span class="tag-badge">#${esc(t)}</span>`).join('')}</span>
      </div>
    </div>`).join('');

  el.querySelectorAll('.memo-item').forEach(el =>
    el.addEventListener('click', () => openMemo(Number(el.dataset.id)))
  );
}

function showEditor(memo) {
  document.getElementById('placeholder').style.display = 'none';
  const area = document.getElementById('editor-area');

  if (!area.querySelector('.editor-header')) {
    area.insertAdjacentHTML('beforeend', `
      <div class="editor-header">
        <input class="title-input" id="memo-title" type="text" placeholder="제목을 입력하세요" />
        <div class="header-actions">
          <button class="btn-save-text" id="btn-save">💾 저장</button>
          <button class="btn-icon danger" id="btn-delete" title="삭제">🗑️</button>
        </div>
      </div>
      <div class="tag-input-area" id="tag-input-area">
        <span class="tag-input-label">태그</span>
        <input class="tag-text-input" id="tag-text" placeholder="태그 입력 후 Enter..." />
      </div>
      <div class="content-area">
        <textarea class="content-input" id="memo-content" placeholder="내용을 입력하세요..."></textarea>
      </div>
      <div class="status-bar">
        <span id="status-msg"><span class="status-dot" id="status-dot"></span>저장됨</span>
        <span id="status-date"></span>
      </div>
    `);
    document.getElementById('btn-save').addEventListener('click', saveCurrentMemo);
    document.getElementById('btn-delete').addEventListener('click', deleteCurrentMemo);
    document.getElementById('memo-title').addEventListener('input', scheduleSave);
    document.getElementById('memo-content').addEventListener('input', scheduleSave);
    document.getElementById('tag-text').addEventListener('keydown', onTagKeydown);
  }

  document.getElementById('memo-title').value = memo.title;
  document.getElementById('memo-content').value = memo.content;
  renderEditorTags(memo.tags);
  setStatus('saved', memo.updated_at);
}

// ── 에디터 태그 관리 ──────────────────────────────────────────
let editorTags = [];

function renderEditorTags(tags) {
  editorTags = [...tags];
  const area = document.getElementById('tag-input-area');
  const input = document.getElementById('tag-text');
  area.querySelectorAll('.tag-chip-editor').forEach(e => e.remove());
  editorTags.forEach(t => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip-editor';
    chip.innerHTML = `#${esc(t)} <button onclick="removeEditorTag('${esc(t)}')">×</button>`;
    area.insertBefore(chip, input);
  });
}

function onTagKeydown(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().toLowerCase().replace(/,/g, '');
    if (val && !editorTags.includes(val)) {
      editorTags.push(val);
      renderEditorTags(editorTags);
      scheduleSave();
    }
    e.target.value = '';
  }
  if (e.key === 'Backspace' && !e.target.value && editorTags.length > 0) {
    editorTags.pop();
    renderEditorTags(editorTags);
    scheduleSave();
  }
}

function removeEditorTag(name) {
  editorTags = editorTags.filter(t => t !== name);
  renderEditorTags(editorTags);
  scheduleSave();
}

function setStatus(state, dateStr = '') {
  const dot = document.getElementById('status-dot');
  const msg = document.getElementById('status-msg');
  const dateEl = document.getElementById('status-date');
  if (!dot) return;
  dot.className = state === 'saving' ? 'status-dot saving' : 'status-dot';
  msg.innerHTML = `<span class="status-dot${state==='saving'?' saving':''}" id="status-dot"></span>${state==='saving'?'저장 중...':'저장됨'}`;
  if (dateEl) dateEl.textContent = dateStr ? dateStr.replace('T', ' ') : '';
}

// ── API ───────────────────────────────────────────────────────
async function apiFetch(url, opts = {}) {
  const res = await fetch(url, { ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) } });
  if (res.status === 401) { logout(); return null; }
  return res;
}

async function fetchMemos() {
  const res = await apiFetch(API);
  if (!res) return;
  memos = await res.json();
  memos.sort((a, b) => b.updated_at.localeCompare(a.updated_at));
  renderList(document.getElementById('search').value);
}

async function fetchTags() {
  const res = await apiFetch('/tags');
  if (!res) return;
  allTags = await res.json();
  renderTagFilter();
}

async function openMemo(id) {
  currentId = id;
  const res = await apiFetch(`${API}/${id}`);
  if (!res) return;
  const memo = await res.json();
  showEditor(memo);
  renderList(document.getElementById('search').value);
  document.getElementById('memo-content')?.focus();
}

async function createMemo() {
  const res = await apiFetch(API, {
    method: 'POST',
    body: JSON.stringify({ title: '', content: '', tags: [] }),
  });
  if (!res) return;
  const memo = await res.json();
  memos.unshift(memo);
  renderList(document.getElementById('search').value);
  openMemo(memo.id);
}

async function saveCurrentMemo() {
  if (!currentId) return;
  clearTimeout(saveTimer);
  const title   = document.getElementById('memo-title')?.value ?? '';
  const content = document.getElementById('memo-content')?.value ?? '';
  const res = await apiFetch(`${API}/${currentId}`, {
    method: 'PUT',
    body: JSON.stringify({ title, content, tags: editorTags }),
  });
  if (!res) return;
  const updated = await res.json();
  const idx = memos.findIndex(m => m.id === currentId);
  if (idx !== -1) memos[idx] = updated;
  memos.sort((a, b) => b.updated_at.localeCompare(a.updated_at));
  setStatus('saved', updated.updated_at);
  await fetchTags();
  renderList(document.getElementById('search').value);
}

async function deleteCurrentMemo() {
  if (!currentId) return;
  if (!confirm('이 메모를 삭제하시겠습니까?')) return;
  await apiFetch(`${API}/${currentId}`, { method: 'DELETE' });
  memos = memos.filter(m => m.id !== currentId);
  currentId = null;
  const area = document.getElementById('editor-area');
  area.querySelector('.editor-header')?.remove();
  area.querySelector('.tag-input-area')?.remove();
  area.querySelector('.content-area')?.remove();
  area.querySelector('.status-bar')?.remove();
  document.getElementById('placeholder').style.display = '';
  await fetchTags();
  renderList(document.getElementById('search').value);
}

function scheduleSave() {
  setStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrentMemo, 800);
}

// ── 초기화 ────────────────────────────────────────────────────
async function initApp() {
  await Promise.all([fetchMemos(), fetchTags()]);
}

document.getElementById('btn-new').addEventListener('click', createMemo);
document.getElementById('search').addEventListener('input', e => renderList(e.target.value));

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveCurrentMemo(); }
});

document.getElementById('auth-username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-password').focus(); });
document.getElementById('auth-password').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });

// 토큰 있으면 바로 앱 진입
if (getToken()) {
  document.getElementById('auth-overlay').style.display = 'none';
  initApp();
}
</script>
