<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메모장</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e2e;
      --surface: #27273a;
      --surface2: #313145;
      --border: #45455f;
      --text: #cdd6f4;
      --subtext: #a6adc8;
      --accent: #89b4fa;
      --accent-hover: #74c7ec;
      --danger: #f38ba8;
      --danger-hover: #eba0ac;
      --green: #a6e3a1;
      --sidebar-w: 280px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; color: var(--accent); }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-top {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .btn-new {
      width: 100%;
      padding: 9px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-new:hover { background: var(--accent-hover); }

    .memo-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .memo-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }
    .memo-item:hover { background: var(--surface2); }
    .memo-item.active {
      background: var(--surface2);
      border-color: var(--accent);
    }
    .memo-item .item-title {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .memo-item .item-date {
      font-size: 0.72rem;
      color: var(--subtext);
      margin-top: 3px;
    }
    .empty-list {
      color: var(--subtext);
      font-size: 0.85rem;
      text-align: center;
      padding: 24px 0;
    }

    /* ── Right pane ── */
    .editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-toolbar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--surface);
      flex-shrink: 0;
      min-height: 52px;
    }

    /* View mode */
    .view-title {
      flex: 1;
      font-size: 1.1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .view-content {
      flex: 1;
      padding: 20px 24px;
      font-size: 0.95rem;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-y: auto;
      color: var(--text);
    }

    /* Edit mode */
    .title-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 600;
      outline: none;
    }
    .title-input::placeholder { color: var(--subtext); }

    .content-input {
      flex: 1;
      background: var(--bg);
      border: none;
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.7;
      resize: none;
      padding: 20px 24px;
      outline: none;
      font-family: inherit;
    }
    .content-input::placeholder { color: var(--subtext); }

    /* Buttons */
    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-edit   { background: var(--accent); color: var(--bg); }
    .btn-edit:hover { background: var(--accent-hover); }
    .btn-save   { background: var(--green); color: var(--bg); }
    .btn-save:hover { filter: brightness(1.1); }
    .btn-cancel { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-cancel:hover { background: var(--border); }
    .btn-delete { background: var(--danger); color: var(--bg); }
    .btn-delete:hover { background: var(--danger-hover); }

    .placeholder-pane {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--subtext);
      font-size: 0.95rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 600px) {
      .sidebar { width: 200px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📝 메모장</h1>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="btn-new" onclick="newMemo()">+ 새 메모</button>
    </div>
    <div class="memo-list" id="memo-list"></div>
  </aside>

  <main class="editor-pane">
    <!-- 선택 전 안내 -->
    <div class="placeholder-pane" id="placeholder">메모를 선택하거나 새 메모를 만드세요.</div>

    <!-- 뷰 모드 (읽기 전용) -->
    <div id="view-pane" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="pane-toolbar">
        <span class="view-title" id="view-title"></span>
        <button class="btn btn-edit" onclick="startEdit()">수정</button>
        <button class="btn btn-delete" onclick="deleteMemo()">삭제</button>
      </div>
      <div class="view-content" id="view-content"></div>
    </div>

    <!-- 편집 모드 -->
    <div id="edit-pane" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="pane-toolbar">
        <input class="title-input" id="title-input" type="text" placeholder="제목을 입력하세요" />
        <button class="btn btn-save" onclick="saveMemo()">저장</button>
        <button class="btn btn-cancel" onclick="cancelEdit()">취소</button>
      </div>
      <textarea class="content-input" id="content-input" placeholder="내용을 입력하세요..."></textarea>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';
  let memos = [];
  let currentId = null;

  async function fetchMemos() {
    const res = await fetch(`${API}/memos`);
    memos = await res.json();
    renderList();
  }

  function renderList() {
    const list = document.getElementById('memo-list');
    if (memos.length === 0) {
      list.innerHTML = '<p class="empty-list">메모가 없습니다.</p>';
      return;
    }
    list.innerHTML = memos.map(m => `
      <div class="memo-item ${m.id === currentId ? 'active' : ''}" onclick="selectMemo(${m.id})">
        <div class="item-title">${escHtml(m.title) || '(제목 없음)'}</div>
        <div class="item-date">${formatDate(m.updated_at)}</div>
      </div>
    `).join('');
  }

  // 메모 클릭 → 뷰 모드
  function selectMemo(id) {
    const memo = memos.find(m => m.id === id);
    if (!memo) return;
    currentId = id;
    showViewPane(memo);
    renderList();
  }

  function showViewPane(memo) {
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('edit-pane').style.display = 'none';
    const vp = document.getElementById('view-pane');
    vp.style.display = 'flex';
    document.getElementById('view-title').textContent = memo.title || '(제목 없음)';
    document.getElementById('view-content').textContent = memo.content;
  }

  // 수정 버튼 → 편집 모드
  function startEdit() {
    const memo = memos.find(m => m.id === currentId);
    if (!memo) return;
    document.getElementById('view-pane').style.display = 'none';
    const ep = document.getElementById('edit-pane');
    ep.style.display = 'flex';
    document.getElementById('title-input').value = memo.title;
    document.getElementById('content-input').value = memo.content;
    document.getElementById('title-input').focus();
  }

  // 새 메모 → 바로 편집 모드
  function newMemo() {
    currentId = null;
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('view-pane').style.display = 'none';
    const ep = document.getElementById('edit-pane');
    ep.style.display = 'flex';
    document.getElementById('title-input').value = '';
    document.getElementById('content-input').value = '';
    document.getElementById('title-input').focus();
    renderList();
  }

  // 취소 → 기존 메모면 뷰 모드 복귀, 새 메모면 placeholder
  function cancelEdit() {
    if (currentId !== null) {
      const memo = memos.find(m => m.id === currentId);
      if (memo) { showViewPane(memo); return; }
    }
    document.getElementById('edit-pane').style.display = 'none';
    document.getElementById('placeholder').style.display = 'flex';
  }

  async function saveMemo() {
    const title = document.getElementById('title-input').value.trim();
    const content = document.getElementById('content-input').value;
    if (!title) { showToast('제목을 입력하세요.'); return; }

    let saved;
    if (currentId === null) {
      const res = await fetch(`${API}/memos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content }),
      });
      saved = await res.json();
      currentId = saved.id;
    } else {
      const res = await fetch(`${API}/memos/${currentId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content }),
      });
      saved = await res.json();
    }

    await fetchMemos();
    showViewPane(saved);   // 저장 후 뷰 모드로 전환
    showToast('저장했습니다.');
  }

  async function deleteMemo() {
    if (!currentId) return;
    if (!confirm('이 메모를 삭제하시겠습니까?')) return;
    await fetch(`${API}/memos/${currentId}`, { method: 'DELETE' });
    currentId = null;
    document.getElementById('view-pane').style.display = 'none';
    document.getElementById('edit-pane').style.display = 'none';
    document.getElementById('placeholder').style.display = 'flex';
    await fetchMemos();
    showToast('삭제했습니다.');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  fetchMemos();
</script>
</body>
</html>
