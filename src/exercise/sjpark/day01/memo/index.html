<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메모장</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- 인증 오버레이 -->
<div id="auth-overlay">
  <div class="auth-card">
    <h2 class="auth-title">📝 메모장</h2>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">회원가입</button>
    </div>

    <div id="auth-error" class="auth-error" style="display:none;"></div>

    <form id="auth-form" onsubmit="submitAuth(event)">
      <input class="auth-input" id="auth-username" type="text" placeholder="아이디" autocomplete="username" required />
      <input class="auth-input" id="auth-password" type="password" placeholder="비밀번호" autocomplete="current-password" required />
      <button class="auth-submit" type="submit" id="auth-submit-btn">로그인</button>
    </form>
  </div>
</div>

<!-- 메인 앱 -->
<header>
  <h1>📝 메모장</h1>
  <div class="header-user">
    <span id="header-username"></span>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="btn-new" onclick="newMemo()">+ 새 메모</button>
    </div>
    <div class="memo-list" id="memo-list"></div>
  </aside>

  <main class="editor-pane">
    <div class="placeholder-pane" id="placeholder">메모를 선택하거나 새 메모를 만드세요.</div>

    <!-- 뷰 모드 -->
    <div id="view-pane" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="pane-toolbar">
        <span class="view-title" id="view-title"></span>
        <button class="btn btn-edit" onclick="startEdit()">수정</button>
        <button class="btn btn-delete" onclick="deleteMemo()">삭제</button>
      </div>
      <div class="view-content" id="view-content"></div>
    </div>

    <!-- 편집 모드 -->
    <div id="edit-pane" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="pane-toolbar">
        <input class="title-input" id="title-input" type="text" placeholder="제목을 입력하세요" />
        <button class="btn btn-save" onclick="saveMemo()">저장</button>
        <button class="btn btn-cancel" onclick="cancelEdit()">취소</button>
      </div>
      <textarea class="content-input" id="content-input" placeholder="내용을 입력하세요..."></textarea>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
