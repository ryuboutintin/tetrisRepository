<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자기소개 에디터 | 박수진</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Light */
      --bg:      #f9f9f7;
      --surface: #ffffff;
      --border:  #e5e5e0;
      --text:    #1a1a1a;
      --muted:   #6b6b6b;
      --accent:  #2563eb;
      /* Dark editor (Catppuccin Mocha) */
      --ed-bg:     #1e1e2e;
      --ed-header: #181825;
      --ed-text:   #cdd6f4;
      --ed-muted:  #6c7086;
      --ed-border: #313244;
      --ed-sel:    #45475a;
    }

    /* ── 라디오 인풋 숨기기 (모바일 탭 트릭용) ── */
    #tab-editor,
    #tab-preview { display: none; }

    /* ── Body ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── App shell ── */
    .app {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* ── Header ── */
    .app-header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 52px;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .app-brand {
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
    }

    .app-brand .slash { color: var(--accent); }

    /* 데스크톱용 배지 */
    .app-badge {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.15rem 0.65rem;
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* 모바일 탭 바 (기본 숨김) */
    .tab-bar {
      display: none;
      margin-left: auto;
    }

    .tab-bar label {
      display: inline-block;
      padding: 0.3rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-bar label:hover { color: var(--text); }

    /* ── Editor Layout ── */
    .editor-layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ── 공통 Pane ── */
    .pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .pane-header {
      flex-shrink: 0;
      padding: 0.45rem 1.25rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    /* ── 에디터 Pane ── */
    .pane--editor { background: var(--ed-bg); border-right: 1px solid var(--ed-border); }

    .pane--editor .pane-header {
      background: var(--ed-header);
      color: var(--ed-muted);
      border-bottom: 1px solid var(--ed-border);
    }

    .editor-textarea {
      flex: 1;
      min-height: 0;
      padding: 1.25rem 1.5rem;
      background: var(--ed-bg);
      color: var(--ed-text);
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "Courier New", monospace;
      font-size: 0.875rem;
      line-height: 1.9;
      border: none;
      resize: none;
      outline: none;
      overflow-y: auto;
      tab-size: 2;
    }

    .editor-textarea::selection { background: var(--ed-sel); }

    /* ── 미리보기 Pane ── */
    .pane--preview { background: var(--bg); }

    .pane--preview .pane-header {
      background: var(--surface);
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .preview-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 2rem 1.5rem;
    }

    /* ── 카드 컨테이너 ── */
    .card {
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.25rem 2.5rem;
    }

    /* ── 마크다운 렌더링 결과 스타일 ── */
    .preview-output h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .preview-output h2 {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 1.5rem;
      margin-bottom: 0.65rem;
    }

    .preview-output h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    .preview-output p {
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }

    .preview-output blockquote {
      color: var(--muted);
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      margin: 0.25rem 0 0.75rem;
      font-size: 0.95rem;
    }

    .preview-output blockquote p { margin-bottom: 0; }

    .preview-output hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    .preview-output code {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1rem 0.45rem;
      font-size: 0.82rem;
    }

    .preview-output pre {
      background: var(--ed-bg);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .preview-output pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--ed-text);
    }

    .preview-output ul,
    .preview-output ol {
      padding-left: 1.5rem;
      font-size: 0.9rem;
    }

    .preview-output li { margin-bottom: 0.3rem; }

    .preview-output a { color: var(--accent); text-decoration: none; }
    .preview-output a:hover { text-decoration: underline; }

    .preview-output strong { font-weight: 700; }
    .preview-output em     { font-style: italic; }

    /* ────────────────────────────
       모바일 (768px 이하)
       CSS Radio Trick 으로 탭 전환
    ──────────────────────────── */
    @media (max-width: 768px) {
      .app-badge { display: none; }
      .tab-bar   { display: block; }

      .editor-layout { grid-template-columns: 1fr; }

      /* 기본: 두 pane 모두 숨김 */
      .pane--editor,
      .pane--preview { display: none; }

      /* 에디터 탭 선택 시 → 에디터 pane 표시 */
      #tab-editor:checked ~ .app .pane--editor  { display: flex; }

      /* 미리보기 탭 선택 시 → 미리보기 pane 표시 */
      #tab-preview:checked ~ .app .pane--preview { display: flex; }

      /* 선택된 탭 강조 */
      #tab-editor:checked  ~ .app label[for="tab-editor"],
      #tab-preview:checked ~ .app label[for="tab-preview"] {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .card { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>

  <!--
    라디오 인풋이 .app 의 형제(sibling)여야
    CSS ~ 선택자로 .app 내부를 제어할 수 있어요.
  -->
  <input type="radio" id="tab-editor"  name="tab" checked />
  <input type="radio" id="tab-preview" name="tab" />

  <div class="app">

    <!-- ── 헤더 ── -->
    <header class="app-header">
      <div class="app-brand">
        <span class="slash">//</span> 자기소개 에디터
      </div>
      <span class="app-badge">HTML · CSS · JS</span>

      <!-- 모바일 탭 -->
      <div class="tab-bar">
        <label for="tab-editor">에디터</label>
        <label for="tab-preview">미리보기</label>
      </div>
    </header>

    <!-- ── 메인 레이아웃 ── -->
    <div class="editor-layout">

      <!-- 왼쪽: 마크다운 에디터 -->
      <div class="pane pane--editor">
        <div class="pane-header">📝 &nbsp;markdown</div>
        <textarea id="editor" class="editor-textarea" spellcheck="false"># 박수진

      <!-- 오른쪽: 실시간 렌더링 미리보기 -->
      <div class="pane pane--preview">
        <div class="pane-header">👁 &nbsp;preview</div>
        <div class="preview-scroll">
          <div class="card">
            <div id="preview-output" class="preview-output"></div>
          </div>
        </div>
      </div><!-- .pane--preview -->

    </div><!-- .editor-layout -->
  </div><!-- .app -->

  <script>
    const editor = document.getElementById('editor');
    const output = document.getElementById('preview-output');

    marked.use({ breaks: true });

    function render() {
      output.innerHTML = marked.parse(editor.value);
    }

    editor.addEventListener('input', render);
    render();
  </script>

</body>
</html>
