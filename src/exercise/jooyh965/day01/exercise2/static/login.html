<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 · Memo App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
    <main class="auth-wrapper">
        <section class="card auth-card">
            <header class="auth-header">
                <h1>📝 Memo</h1>
                <p class="auth-sub">메모를 시작하려면 로그인하세요</p>
            </header>

            <div class="auth-tabs" role="tablist">
                <button type="button" class="auth-tab active" data-tab="login" role="tab">로그인</button>
                <button type="button" class="auth-tab" data-tab="signup" role="tab">회원가입</button>
            </div>

            <form id="loginForm" class="auth-form" data-pane="login">
                <label>
                    <span>아이디</span>
                    <input
                        type="text"
                        name="username"
                        required
                        minlength="3"
                        maxlength="50"
                        autocomplete="username"
                        autofocus
                    >
                </label>
                <label>
                    <span>비밀번호</span>
                    <input
                        type="password"
                        name="password"
                        required
                        minlength="8"
                        maxlength="128"
                        autocomplete="current-password"
                    >
                </label>
                <button type="submit" class="btn-primary auth-submit">로그인</button>
            </form>

            <form id="signupForm" class="auth-form" data-pane="signup" hidden>
                <label>
                    <span>아이디 <em>(3~50자)</em></span>
                    <input
                        type="text"
                        name="username"
                        required
                        minlength="3"
                        maxlength="50"
                        autocomplete="username"
                    >
                </label>
                <label>
                    <span>비밀번호 <em>(8자 이상)</em></span>
                    <input
                        type="password"
                        name="password"
                        required
                        minlength="8"
                        maxlength="128"
                        autocomplete="new-password"
                    >
                </label>
                <label>
                    <span>비밀번호 확인</span>
                    <input
                        type="password"
                        name="password2"
                        required
                        minlength="8"
                        maxlength="128"
                        autocomplete="new-password"
                    >
                </label>
                <button type="submit" class="btn-primary auth-submit">회원가입</button>
            </form>
        </section>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script src="/static/auth.js"></script>
</body>
</html>
