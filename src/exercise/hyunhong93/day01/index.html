<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hyunhong93 - 개인 랜딩 페이지</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 24px;
      max-width: 480px;
      width: 90%;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    }

    /* ── 프로필 사진 ── */
    .profile-photo-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 28px;
    }

    .profile-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: #2a2a3a;
    }

    .profile-photo-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff 0%, #3ec6e0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -2px;
      user-select: none;
    }

    .status-dot {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #22c55e;
      border: 3px solid #1a1a24;
    }

    /* ── 소개 ── */
    .name {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .handle {
      font-size: 0.95rem;
      color: #6c63ff;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #6c63ff, #3ec6e0);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .bio {
      font-size: 0.95rem;
      line-height: 1.75;
      color: #a0a0b8;
      margin-bottom: 12px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .tag {
      background: #24243a;
      border: 1px solid #3a3a54;
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 0.8rem;
      color: #9090b8;
    }

    /* ── SNS 링크 ── */
    .sns-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #5a5a78;
      margin-bottom: 14px;
    }

    .sns-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sns-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      border-radius: 12px;
      background: #20202e;
      border: 1px solid #2e2e42;
      text-decoration: none;
      color: #d0d0e8;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .sns-link:hover {
      background: #2a2a3e;
      border-color: #5555aa;
      transform: translateY(-2px);
    }

    .sns-link .icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .sns-link .label {
      flex: 1;
      text-align: left;
    }

    .sns-link .arrow {
      color: #4a4a68;
      font-size: 0.8rem;
    }

    .icon-github  { background: #24292e; }
    .icon-twitter { background: #1da1f2; }
    .icon-linkedin { background: #0077b5; }
    .icon-email   { background: #ea4335; }

    footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: #3a3a54;
    }
  </style>
</head>
