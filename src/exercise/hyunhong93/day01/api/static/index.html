<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hyunhong의 메모 앱</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 28px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 560px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus { border-color: #6366f1; }

    textarea { resize: vertical; min-height: 90px; }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    .btn-primary { background: #6366f1; color: white; width: 100%; }

    .memo-list { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 12px; }

    .memo-item {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .memo-body { flex: 1; }

    .memo-title { font-weight: 700; font-size: 1rem; color: #111; margin-bottom: 4px; }

    .memo-content { font-size: 0.88rem; color: #555; white-space: pre-wrap; }

    .memo-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-edit { background: #e0e7ff; color: #4338ca; }
    .btn-delete { background: #fee2e2; color: #dc2626; }

    .empty { color: #9ca3af; text-align: center; padding: 20px 0; font-size: 0.95rem; }

    /* 모달 */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      margin: 16px;
    }

    .modal h2 { margin-bottom: 18px; font-size: 1.1rem; color: #1a1a2e; }

    .modal-actions { display: flex; gap: 10px; margin-top: 4px; }

    .btn-secondary { background: #f3f4f6; color: #374151; flex: 1; }
    .btn-save { background: #6366f1; color: white; flex: 1; }
  </style>
</head>
<body>

<h1>📝 hyunhong의 메모 앱</h1>

<!-- 새 메모 폼 -->
<div class="card">
  <input id="new-title" type="text" placeholder="제목" />
  <textarea id="new-content" placeholder="내용 (선택)"></textarea>
  <button class="btn-primary" onclick="createMemo()">메모 추가</button>
</div>

<!-- 메모 목록 -->
<div class="memo-list" id="memo-list"></div>

<!-- 수정 모달 -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2>메모 수정</h2>
    <input id="edit-title" type="text" placeholder="제목" />
    <textarea id="edit-content" placeholder="내용 (선택)"></textarea>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveMemo()">저장</button>
    </div>
  </div>
</div>

<script>
  const API = '/api/memos';
  let editingId = null;

  async function fetchMemos() {
    const res = await fetch(API);
    const memos = await res.json();
    const list = document.getElementById('memo-list');

    if (memos.length === 0) {
      list.innerHTML = '<div class="empty">메모가 없습니다. 첫 메모를 추가해보세요!</div>';
      return;
    }

    list.innerHTML = memos.map(m => `
      <div class="memo-item">
        <div class="memo-body">
          <div class="memo-title">${escHtml(m.title)}</div>
          ${m.content ? `<div class="memo-content">${escHtml(m.content)}</div>` : ''}
        </div>
        <div class="memo-actions">
          <button class="btn-edit" onclick="openModal(${m.id}, '${escAttr(m.title)}', '${escAttr(m.content || '')}')">수정</button>
          <button class="btn-delete" onclick="deleteMemo(${m.id})">삭제</button>
        </div>
      </div>
    `).join('');
  }

  async function createMemo() {
    const title = document.getElementById('new-title').value.trim();
    const content = document.getElementById('new-content').value.trim();
    if (!title) { alert('제목을 입력해주세요'); return; }

    await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content: content || null })
    });

    document.getElementById('new-title').value = '';
    document.getElementById('new-content').value = '';
    fetchMemos();
  }

  async function deleteMemo(id) {
    if (!confirm('삭제할까요?')) return;
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    fetchMemos();
  }

  function openModal(id, title, content) {
    editingId = id;
    document.getElementById('edit-title').value = title;
    document.getElementById('edit-content').value = content;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    editingId = null;
    document.getElementById('modal').classList.remove('open');
  }

  async function saveMemo() {
    const title = document.getElementById('edit-title').value.trim();
    const content = document.getElementById('edit-content').value.trim();
    if (!title) { alert('제목을 입력해주세요'); return; }

    await fetch(`${API}/${editingId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content: content || null })
    });

    closeModal();
    fetchMemos();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function escAttr(str) {
    return str.replace(/'/g, "\\'").replace(/\n/g, '\\n');
  }

  fetchMemos();
</script>
</body>
</html>
