<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hyunhong의 메모 앱</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 { font-size: 1.8rem; color: #1a1a2e; margin-bottom: 28px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
    }

    .card h2 { font-size: 1.1rem; color: #1a1a2e; margin-bottom: 18px; }

    input[type=text], input[type=password], textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input:focus, textarea:focus { border-color: #6366f1; }
    textarea { resize: vertical; min-height: 80px; }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.15s;
      font-family: inherit;
    }

    button:hover { opacity: 0.85; }

    .btn-primary   { background: #6366f1; color: white; width: 100%; margin-bottom: 10px; }
    .btn-link      { background: none; color: #6366f1; width: 100%; font-weight: 400; font-size: 0.88rem; }
    .btn-logout    { background: #fee2e2; color: #dc2626; padding: 6px 14px; font-size: 0.85rem; }
    .btn-edit      { background: #e0e7ff; color: #4338ca; }
    .btn-delete    { background: #fee2e2; color: #dc2626; }
    .btn-save      { background: #6366f1; color: white; flex: 1; }
    .btn-secondary { background: #f3f4f6; color: #374151; flex: 1; }

    .error { color: #dc2626; font-size: 0.85rem; margin-bottom: 10px; min-height: 18px; }

    /* 앱 헤더 */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 580px;
      margin-bottom: 16px;
    }

    .app-header h1 { margin-bottom: 0; font-size: 1.4rem; }
    .user-info { font-size: 0.9rem; color: #555; }

    /* 메모 폼 */
    .memo-form { max-width: 580px; padding: 20px 24px; }
    .memo-form .btn-primary { margin-bottom: 0; }

    /* 태그 입력 */
    .tag-input-wrap { margin-bottom: 12px; }

    .tag-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      cursor: text;
      transition: border-color 0.2s;
      align-items: center;
    }

    .tag-chips:focus-within { border-color: #6366f1; }

    .tag-chips input {
      border: none;
      outline: none;
      font-size: 0.88rem;
      padding: 2px 4px;
      margin-bottom: 0;
      flex: 1;
      min-width: 80px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: default;
    }

    .chip .chip-del {
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      opacity: 0.6;
    }

    .chip .chip-del:hover { opacity: 1; }

    .tag-hint { font-size: 0.78rem; color: #9ca3af; margin-top: 4px; }

    /* 태그 필터 */
    .tag-filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: 100%;
      max-width: 580px;
      margin-bottom: 16px;
      min-height: 32px;
    }

    .filter-chip {
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-chip:hover { opacity: 0.85; }
    .filter-chip.active { border-color: #1a1a2e; }

    .filter-all {
      background: #e5e7eb;
      color: #374151;
    }

    .filter-all.active { background: #374151; color: white; }

    /* 메모 목록 */
    .memo-list { width: 100%; max-width: 580px; display: flex; flex-direction: column; gap: 12px; }

    .memo-item {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .memo-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .memo-title { font-weight: 700; font-size: 1rem; color: #111; }
    .memo-content { font-size: 0.88rem; color: #555; white-space: pre-wrap; margin-bottom: 10px; }
    .memo-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .memo-tags { display: flex; flex-wrap: wrap; gap: 6px; }

    .empty { color: #9ca3af; text-align: center; padding: 20px 0; font-size: 0.95rem; }

    /* 모달 */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      margin: 16px;
    }

    .modal h2 { margin-bottom: 18px; font-size: 1.1rem; color: #1a1a2e; }
    .modal-actions { display: flex; gap: 10px; margin-top: 4px; }

    /* 화면 전환 */
    .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="screen-login" class="screen active">
  <h1>📝 hyunhong의 메모 앱</h1>
  <div class="card">
    <h2>로그인</h2>
    <input id="login-username" type="text" placeholder="아이디" />
    <input id="login-password" type="password" placeholder="비밀번호" />
    <div id="login-error" class="error"></div>
    <button class="btn-primary" onclick="login()">로그인</button>
    <button class="btn-link" onclick="showScreen('register')">계정이 없으신가요? 회원가입</button>
  </div>
</div>

<!-- 회원가입 화면 -->
<div id="screen-register" class="screen">
  <h1>📝 hyunhong의 메모 앱</h1>
  <div class="card">
    <h2>회원가입</h2>
    <input id="reg-username" type="text" placeholder="아이디" />
    <input id="reg-password" type="password" placeholder="비밀번호" />
    <div id="reg-error" class="error"></div>
    <button class="btn-primary" onclick="register()">회원가입</button>
    <button class="btn-link" onclick="showScreen('login')">이미 계정이 있으신가요? 로그인</button>
  </div>
</div>

<!-- 메모 앱 화면 -->
<div id="screen-app" class="screen">
  <div class="app-header">
    <h1>📝 메모 앱</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="user-info" id="username-display"></span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <!-- 메모 작성 폼 -->
  <div class="card memo-form">
    <input id="new-title" type="text" placeholder="제목" />
    <textarea id="new-content" placeholder="내용 (선택)"></textarea>
    <div class="tag-input-wrap">
      <div class="tag-chips" id="new-tag-chips" onclick="document.getElementById('new-tag-input').focus()">
        <input id="new-tag-input" type="text" placeholder="태그 입력 후 Enter" />
      </div>
      <div class="tag-hint">Enter 또는 쉼표로 태그 추가</div>
    </div>
    <button class="btn-primary" onclick="createMemo()">메모 추가</button>
  </div>

  <!-- 태그 필터 -->
  <div class="tag-filter-bar" id="tag-filter-bar"></div>

  <!-- 메모 목록 -->
  <div class="memo-list" id="memo-list"></div>
</div>

<!-- 수정 모달 -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2>메모 수정</h2>
    <input id="edit-title" type="text" placeholder="제목" />
    <textarea id="edit-content" placeholder="내용 (선택)"></textarea>
    <div class="tag-input-wrap">
      <div class="tag-chips" id="edit-tag-chips" onclick="document.getElementById('edit-tag-input').focus()">
        <input id="edit-tag-input" type="text" placeholder="태그 입력 후 Enter" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveMemo()">저장</button>
    </div>
  </div>
</div>

<script>
  const API = '/api/memos';
  let editingId = null;
  let activeTag = null;

  // 태그 색상 (이름 기반으로 고정 색상)
  const TAG_COLORS = [
    ['#dbeafe','#1d4ed8'], ['#dcfce7','#15803d'], ['#fef9c3','#a16207'],
    ['#fce7f3','#be185d'], ['#ede9fe','#7c3aed'], ['#ffedd5','#c2410c'],
    ['#e0f2fe','#0369a1'], ['#f1f5f9','#475569'],
  ];

  function tagColor(name) {
    let h = 0;
    for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
    return TAG_COLORS[h % TAG_COLORS.length];
  }

  // ── 화면 전환 ─────────────────────────────────────────────────────────────

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
  }

  // ── 인증 ──────────────────────────────────────────────────────────────────

  function getToken() { return localStorage.getItem('auth_token'); }
  function getUsername() { return localStorage.getItem('auth_username'); }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() };
  }

  async function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    document.getElementById('login-error').textContent = '';
    if (!username || !password) { document.getElementById('login-error').textContent = '아이디와 비밀번호를 입력해주세요'; return; }

    const res = await fetch('/auth/token', { method: 'POST', body: new URLSearchParams({ username, password }) });
    if (!res.ok) { document.getElementById('login-error').textContent = (await res.json()).detail || '로그인 실패'; return; }
    const data = await res.json();
    localStorage.setItem('auth_token', data.access_token);
    localStorage.setItem('auth_username', username);
    enterApp();
  }

  async function register() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    document.getElementById('reg-error').textContent = '';
    if (!username || !password) { document.getElementById('reg-error').textContent = '아이디와 비밀번호를 입력해주세요'; return; }

    const res = await fetch('/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (!res.ok) { document.getElementById('reg-error').textContent = (await res.json()).detail || '회원가입 실패'; return; }
    document.getElementById('login-username').value = username;
    document.getElementById('login-password').value = password;
    await login();
  }

  function logout() {
    localStorage.removeItem('auth_token');
    localStorage.removeItem('auth_username');
    activeTag = null;
    showScreen('login');
  }

  function enterApp() {
    document.getElementById('username-display').textContent = getUsername() + ' 님';
    showScreen('app');
    initTagInput('new-tag-chips', 'new-tag-input');
    fetchAll();
  }

  // ── 태그 입력 컴포넌트 ────────────────────────────────────────────────────

  function initTagInput(chipsId, inputId) {
    const input = document.getElementById(inputId);
    input._tags = [];

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        addTag(chipsId, inputId, input.value);
      } else if (e.key === 'Backspace' && input.value === '') {
        removeLastTag(chipsId, inputId);
      }
    });

    input.addEventListener('blur', () => {
      if (input.value.trim()) addTag(chipsId, inputId, input.value);
    });
  }

  function addTag(chipsId, inputId, raw) {
    const name = raw.replace(/,/g, '').trim();
    const input = document.getElementById(inputId);
    if (!name || input._tags.includes(name)) { input.value = ''; return; }

    input._tags.push(name);
    input.value = '';
    renderChips(chipsId, inputId);
  }

  function removeTag(chipsId, inputId, name) {
    const input = document.getElementById(inputId);
    input._tags = input._tags.filter(t => t !== name);
    renderChips(chipsId, inputId);
  }

  function removeLastTag(chipsId, inputId) {
    const input = document.getElementById(inputId);
    if (input._tags.length === 0) return;
    input._tags.pop();
    renderChips(chipsId, inputId);
  }

  function renderChips(chipsId, inputId) {
    const wrap = document.getElementById(chipsId);
    const input = document.getElementById(inputId);
    const chips = wrap.querySelectorAll('.chip');
    chips.forEach(c => c.remove());

    input._tags.forEach(name => {
      const [bg, fg] = tagColor(name);
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.style.cssText = `background:${bg}; color:${fg}`;
      chip.innerHTML = `${escHtml(name)} <span class="chip-del" onclick="removeTag('${chipsId}','${inputId}','${escAttr(name)}')">×</span>`;
      wrap.insertBefore(chip, input);
    });
  }

  function setTags(chipsId, inputId, tags) {
    const input = document.getElementById(inputId);
    input._tags = [...tags];
    renderChips(chipsId, inputId);
  }

  function getTags(inputId) {
    return document.getElementById(inputId)._tags || [];
  }

  // ── 태그 필터 ──────────────────────────────────────────────────────────────

  async function fetchAll() {
    await Promise.all([fetchTags(), fetchMemos()]);
  }

  async function fetchTags() {
    const res = await fetch('/api/tags', { headers: authHeaders() });
    if (res.status === 401) { logout(); return; }
    const tags = await res.json();

    const bar = document.getElementById('tag-filter-bar');
    if (tags.length === 0) { bar.innerHTML = ''; return; }

    bar.innerHTML = `<button class="filter-chip filter-all ${activeTag === null ? 'active' : ''}" onclick="setFilter(null)">전체</button>` +
      tags.map(t => {
        const [bg, fg] = tagColor(t);
        const isActive = activeTag === t;
        return `<button class="filter-chip ${isActive ? 'active' : ''}"
          style="background:${bg}; color:${fg}"
          onclick="setFilter('${escAttr(t)}')">${escHtml(t)}</button>`;
      }).join('');
  }

  function setFilter(tag) {
    activeTag = tag;
    fetchAll();
  }

  // ── 메모 CRUD ─────────────────────────────────────────────────────────────

  async function fetchMemos() {
    const url = activeTag ? `${API}?tag=${encodeURIComponent(activeTag)}` : API;
    const res = await fetch(url, { headers: authHeaders() });
    if (res.status === 401) { logout(); return; }
    const memos = await res.json();
    const list = document.getElementById('memo-list');

    if (memos.length === 0) {
      list.innerHTML = `<div class="empty">${activeTag ? `'${escHtml(activeTag)}' 태그 메모가 없습니다` : '메모가 없습니다. 첫 메모를 추가해보세요!'}</div>`;
      return;
    }

    list.innerHTML = memos.map(m => {
      const tagsHtml = m.tags.length
        ? `<div class="memo-tags">${m.tags.map(t => {
            const [bg, fg] = tagColor(t);
            return `<span class="chip" style="background:${bg};color:${fg};cursor:pointer" onclick="setFilter('${escAttr(t)}')">${escHtml(t)}</span>`;
          }).join('')}</div>`
        : '';
      return `
        <div class="memo-item">
          <div class="memo-top">
            <div class="memo-title">${escHtml(m.title)}</div>
            <div class="memo-actions">
              <button class="btn-edit" onclick="openModal(${m.id})">수정</button>
              <button class="btn-delete" onclick="deleteMemo(${m.id})">삭제</button>
            </div>
          </div>
          ${m.content ? `<div class="memo-content">${escHtml(m.content)}</div>` : ''}
          ${tagsHtml}
        </div>`;
    }).join('');
  }

  async function createMemo() {
    const title = document.getElementById('new-title').value.trim();
    const content = document.getElementById('new-content').value.trim();
    const tags = getTags('new-tag-input');
    if (!title) { alert('제목을 입력해주세요'); return; }

    await fetch(API, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ title, content: content || null, tags }),
    });
    document.getElementById('new-title').value = '';
    document.getElementById('new-content').value = '';
    setTags('new-tag-chips', 'new-tag-input', []);
    fetchAll();
  }

  async function deleteMemo(id) {
    if (!confirm('삭제할까요?')) return;
    await fetch(`${API}/${id}`, { method: 'DELETE', headers: authHeaders() });
    fetchAll();
  }

  // 모달 열 때 서버에서 최신 데이터 조회
  async function openModal(id) {
    editingId = id;
    const res = await fetch(`${API}/${id}`, { headers: authHeaders() });
    const m = await res.json();

    document.getElementById('edit-title').value = m.title;
    document.getElementById('edit-content').value = m.content || '';
    initTagInput('edit-tag-chips', 'edit-tag-input');
    setTags('edit-tag-chips', 'edit-tag-input', m.tags);
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    editingId = null;
    document.getElementById('modal').classList.remove('open');
  }

  async function saveMemo() {
    const title = document.getElementById('edit-title').value.trim();
    const content = document.getElementById('edit-content').value.trim();
    const tags = getTags('edit-tag-input');
    if (!title) { alert('제목을 입력해주세요'); return; }

    await fetch(`${API}/${editingId}`, {
      method: 'PUT', headers: authHeaders(),
      body: JSON.stringify({ title, content: content || null, tags }),
    });
    closeModal();
    fetchAll();
  }

  // ── 유틸 ──────────────────────────────────────────────────────────────────

  function escHtml(str = '') {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function escAttr(str = '') {
    return String(str).replace(/'/g, "\\'").replace(/\n/g, '\\n');
  }

  // 토큰 있으면 바로 앱 진입
  if (getToken()) enterApp();
</script>
</body>
</html>
